---
# Split-mode AI workflow: llama-swap on GPU 2 plus vLLM holding GPUs 0,1.
# Invoke with `-e ai_gpu_mode=split` (see Makefile deploy-ai-split).
#
# Order matters:
#   1. ai.yml deploys llama-swap with the split-mode GPU device list.
#   2. vllm.yml renders the vLLM compose at /opt/docker/vllm.
#   3. The trailing play starts the configured vLLM model profile.
#
# The SGLang role and deploy/sglang.yml are kept in the repo for the
# day someone gets the NVFP4 + dsv4 backend past the strict-config
# loader; until then, vLLM is the path that actually serves DSV4 Flash.
- import_playbook: ai.yml
- import_playbook: vllm.yml

- name: Start configured vLLM model profile
  hosts: ai
  become: true
  gather_facts: false
  vars:
    vllm_split_profile: "{{ ai_split_vllm_profile | default('deepseek-v4-flash') }}"
  tasks:
    - name: Start vLLM {{ vllm_split_profile }} profile
      ansible.builtin.command:
        cmd: "docker compose --profile {{ vllm_split_profile }} up -d"
        chdir: "/opt/docker/vllm"
      register: _vllm_up
      changed_when: >-
        'Started' in (_vllm_up.stderr | default(''))
        or 'Creating' in (_vllm_up.stderr | default(''))
        or 'Created' in (_vllm_up.stderr | default(''))
