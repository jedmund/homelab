  tags: [media, sonarr]

- import_playbook: radarr.yml
  tags: [media, radarr]

- import_playbook: lidarr.yml
  tags: [media, lidarr]

- import_playbook: seerr.yml
  tags: [media, seerr]

- import_playbook: unpackerr.yml
  tags: [media, unpackerr]

- import_playbook: jdownloader.yml
  tags: [media, jdownloader]

- import_playbook: pinchflat.yml
  tags: [media, pinchflat]

- import_playbook: slskd.yml
  tags: [media, slskd]

