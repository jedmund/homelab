---
- name: Deploy complete homelab infrastructure
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Display deployment plan
      ansible.builtin.debug:
        msg: |
          Deploying homelab infrastructure in the following order:
          1. Prerequisites (networks, volumes)
          2. Infrastructure Gateway (Traefik, PocketID)
          3. Infrastructure Core (Komodo)
          4. Beszel hub
          5. Beszel agents
          6. Gluetun
          7. Prowlarr
          8. qBittorrent
          9. Sonarr
          10. Radarr
          11. Lidarr
          12. Seerr
          13. Unpackerr
          14. JDownloader
          15. Pinchflat
          16. slskd
          17. Qui
          18. MusicBrainz mirror
          19. RomM
          20. Plex
          21. Multi-Scrobbler
          22. Tunarr
          23. Stash
          24. Immich
          25. Papra
          26. Homebox
          27. Album Sort
          28. Dawarich
          29. Miniflux
          30. Karakeep
          31. Kavita
          32. Strudel
          33. Blinko
          34. Obsidian LiveSync
          35. GitLab
          36. Open WebUI
          37. Paseo Relay
          38. Development macOS
          39. Paseo daemon
          40. n8n
          41. ChangeDetection
          42. Copyparty
          43. Vane
          44. Feederhub
          45. Social
          46. Matrix
          47. AI (max only)
          48. Openclaw
           49. frp
           50. Backup

# Prerequisites - Run once at the beginning
- import_playbook: prerequisites.yml
  tags: [always, prerequisites]

# Infrastructure layer
- import_playbook: infra_gateway.yml
  tags: [infra, infra_gateway]

- import_playbook: infra_core.yml
  tags: [infra, infra_core]

# Monitoring
- import_playbook: beszel.yml
  tags: [monitoring, beszel]

- import_playbook: beszel_agents.yml
  tags: [monitoring, beszel_agents]

# Media stack
- import_playbook: gluetun.yml
  tags: [media, gluetun]

- import_playbook: prowlarr.yml
  tags: [media, prowlarr]

- import_playbook: qbittorrent.yml
  tags: [media, qbittorrent]

- import_playbook: sonarr.yml
  tags: [media, sonarr]

- import_playbook: radarr.yml
  tags: [media, radarr]

