---
- name: Deploy complete homelab infrastructure
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Display deployment plan
      ansible.builtin.debug:
        msg: |
          Deploying homelab infrastructure in the following order:
          1. Prerequisites (networks, volumes)
          2. Infrastructure Gateway (Traefik, PocketID)
          3. Infrastructure Core (Komodo)
          4. Gluetun
          5. Prowlarr
          6. qBittorrent
          7. Sonarr
          8. Radarr
          9. Lidarr
          10. Seerr
          11. Unpackerr
          12. JDownloader
          13. Pinchflat
          14. slskd
          15. Qui
          16. MusicBrainz mirror
          17. RomM
          18. Plex
          19. Multi-Scrobbler
          20. Tunarr
          21. Stash
          22. Immich
          23. Papra
          24. Homebox
          25. Album Sort
          26. Dawarich
          27. Miniflux
          28. Karakeep
          29. Kavita
          30. Strudel
          31. Blinko
          32. Obsidian LiveSync
          33. GitLab
          34. Open WebUI
          35. Paseo Relay
          36. Development macOS
          37. Paseo daemon
          38. n8n
          39. ChangeDetection
          40. Copyparty
          41. Vane
          42. Feederhub
          43. Social
          44. Matrix
          45. AI (max only)
          46. Openclaw
          47. Backup

# Prerequisites - Run once at the beginning
- import_playbook: prerequisites.yml
  tags: [always, prerequisites]

# Infrastructure layer
- import_playbook: infra_gateway.yml
  tags: [infra, infra_gateway]

- import_playbook: infra_core.yml
  tags: [infra, infra_core]

# Media stack
- import_playbook: gluetun.yml
  tags: [media, gluetun]

- import_playbook: prowlarr.yml
  tags: [media, prowlarr]

- import_playbook: qbittorrent.yml
  tags: [media, qbittorrent]

