  tags: [dev, paseo_relay]

# Development (macOS) stack - GitLab Runner on mac-mini for iOS builds
- import_playbook: development_macos.yml
  tags: [dev, development_macos]

# Paseo daemon (native macOS install on mac-mini)
- import_playbook: paseo_daemon.yml
  tags: [dev, paseo_daemon]

# Utility product stacks
- import_playbook: n8n.yml
  tags: [n8n]

