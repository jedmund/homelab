---
- name: Deploy complete homelab infrastructure
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Display deployment plan
      debug:
        msg: |
          Deploying homelab infrastructure in the following order:
          1. Prerequisites (networks, volumes)
          2. Infrastructure Gateway (Traefik, PocketID)
          3. Infrastructure Core (Komodo)
          4. Media Acquisition
          5. MusicBrainz mirror
          6. Media Consumption
          7. Content Management
          8. Development
          9. Utilities
          10. Productivity
          11. Social
          12. Matrix
          13. AI (max only)
          14. Backup

# Prerequisites - Run once at the beginning
- import_playbook: prerequisites.yml
  tags: [always, prerequisites]

# Infrastructure layer
- import_playbook: infra_gateway.yml
  tags: [infra, infra_gateway]

- import_playbook: infra_core.yml
  tags: [infra, infra_core]

# Media stack
- import_playbook: media_acquisition.yml
  tags: [media, media_acquisition]

- import_playbook: musicbrainz.yml
  tags: [media, musicbrainz]

- import_playbook: media_consumption.yml
  tags: [media, media_consumption]

# Reading stack (Miniflux, Reactflux, FiveFilters, Karakeep, Kavita)
- import_playbook: reading.yml
  tags: [reading]

# Content stack
- import_playbook: content_management.yml
  tags: [content, content_management]

# Development stack
- import_playbook: development.yml
  tags: [dev, development]

# Development (macOS) stack - GitLab Runner on mac-mini for iOS builds
- import_playbook: development_macos.yml
  tags: [dev, development_macos]

# Paseo daemon (native macOS install on mac-mini)
- import_playbook: paseo_daemon.yml
  tags: [dev, paseo_daemon]

# Utilities stack
- import_playbook: utilities.yml
  tags: [utilities]

# Productivity stack
- import_playbook: productivity.yml
  tags: [productivity]

# Social stack
- import_playbook: social.yml
  tags: [social]

# Matrix stack
- import_playbook: matrix.yml
  tags: [matrix]

# AI stack (targets the `ai` group — currently `max` only)
# Includes gpu_tools role (hwsummary, gpu-burn helpers in /usr/local/bin)
- import_playbook: ai.yml
  tags: [ai]

# Openclaw (targets the `openclaw` group, currently `mac-mini` only)
- import_playbook: openclaw.yml
  tags: [openclaw]

# Backup stack (deploy last - snapshots whatever is on disk)
- import_playbook: backup.yml
  tags: [backup]
