---
- name: Deploy complete homelab infrastructure
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Display deployment plan
      ansible.builtin.debug:
        msg: |
          Deploying homelab infrastructure in the following order:
          1. Prerequisites (networks, volumes)
          2. Infrastructure Gateway (Traefik, PocketID)
          3. Infrastructure Core (Komodo)
          4. Line dashboard
          5. Beszel hub
          6. Beszel agents
          7. Gluetun
          8. Prowlarr
          9. qBittorrent
          10. Sonarr
          11. Radarr
          12. Lidarr
          13. Seerr
          14. Unpackerr
          15. JDownloader
          16. Pinchflat
          17. slskd
          18. Qui
          19. MusicBrainz mirror
          20. RomM
          21. Plex
          22. Multi-Scrobbler
          23. Tunarr
          24. Stash
          25. Immich
          26. Papra
          27. Homebox
          28. Album Sort
          29. Dawarich
          30. Miniflux
          31. Karakeep
          32. Kavita
          33. Strudel
          34. Blinko
          35. Obsidian LiveSync
          36. GitLab
          37. Open WebUI
          38. Paseo Relay
          39. Development macOS
          40. Paseo daemon
          41. n8n
          42. ChangeDetection
          43. Copyparty
          44. Vane
          45. Feederhub
          46. Social
          47. Matrix
          48. AI (max only)
          49. Openclaw
          50. Backup

# Prerequisites - Run once at the beginning
- import_playbook: prerequisites.yml
  tags: [always, prerequisites]

# Infrastructure layer
- import_playbook: infra_gateway.yml
  tags: [infra, infra_gateway]

- import_playbook: infra_core.yml
  tags: [infra, infra_core]

# Root dashboard
- import_playbook: line.yml
  tags: [line]

# Monitoring
- import_playbook: beszel.yml
  tags: [monitoring, beszel]

- import_playbook: beszel_agents.yml
  tags: [monitoring, beszel_agents]

# Media stack
- import_playbook: gluetun.yml
  tags: [media, gluetun]

- import_playbook: prowlarr.yml
  tags: [media, prowlarr]

- import_playbook: qbittorrent.yml
  tags: [media, qbittorrent]

- import_playbook: sonarr.yml
  tags: [media, sonarr]

- import_playbook: radarr.yml
  tags: [media, radarr]

- import_playbook: lidarr.yml
  tags: [media, lidarr]

- import_playbook: seerr.yml
  tags: [media, seerr]

- import_playbook: unpackerr.yml
  tags: [media, unpackerr]

- import_playbook: jdownloader.yml
  tags: [media, jdownloader]

- import_playbook: pinchflat.yml
  tags: [media, pinchflat]

- import_playbook: slskd.yml
  tags: [media, slskd]

- import_playbook: qui.yml
  tags: [media, qui]

- import_playbook: musicbrainz.yml
  tags: [media, musicbrainz]

- import_playbook: romm.yml
  tags: [media, romm]

- import_playbook: plex.yml
  tags: [media, plex]

- import_playbook: multi_scrobbler.yml
  tags: [media, multi_scrobbler]

- import_playbook: tunarr.yml
  tags: [media, tunarr]

- import_playbook: stash.yml
  tags: [media, stash]

# Product stacks
- import_playbook: immich.yml
  tags: [immich]

- import_playbook: papra.yml
  tags: [papra]

- import_playbook: homebox.yml
  tags: [homebox]

- import_playbook: album_sort.yml
  tags: [album_sort]

- import_playbook: dawarich.yml
  tags: [dawarich]

- import_playbook: miniflux.yml
  tags: [miniflux]

- import_playbook: karakeep.yml
  tags: [karakeep]

- import_playbook: kavita.yml
  tags: [kavita]

