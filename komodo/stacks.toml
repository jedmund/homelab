# Komodo Resource Sync declarations for Ansible-rendered compose stacks.
# Ansible remains the source of truth for /opt/docker/<stack>/compose.yaml
# and any env/config files. Komodo reads those host files and may redeploy
# them on demand, but it should not clone stack repos or auto-update images.

[[stack]]
name = "infra-gateway"
description = "Traefik, PocketID, TinyAuth, ddclient, AdGuard, and OpenSpeedTest"
tags = ["homelab", "ansible", "nuc-mini", "infrastructure"]
[stack.config]
server = "Atelier"
files_on_host = true
run_directory = "/opt/docker/infra-gateway"
file_paths = ["compose.yaml"]
poll_for_updates = false
auto_update = false

