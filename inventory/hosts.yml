---
all:
  children:
    compute_servers:
      hosts:
        max:
          ansible_host: 192.168.1.100
          ansible_port: 6768
          ansible_user: justin
          server_role: local_llm
          known_hosts: max
          # GPU Config
          # 3x RTX Pro 6000 Blackwell after the 2026-06-01 rebuild:
          #   index 0,1: Max-Q Workstation Edition (300 W) at 21:00 / D1:00
          #   index 2:   full Workstation Edition (600 W) at F1:00
          # See roles/ai/defaults/main.yml ai_gpu_mode for how llama-swap
          # and sglang pin specific cards.
          gpu_type: nvidia
          gpu_model: rtx_pro_6000_blackwell
          gpu_count: 3
          gpu_vram_gb: 288
          docker_gpu: true
          docker_runtime: nvidia
          docker_devices:
            - /dev/nvidia0:/dev/nvidia0
            - /dev/nvidia1:/dev/nvidia1
            - /dev/nvidia2:/dev/nvidia2
            - /dev/nvidiactl:/dev/nvidiactl
            - /dev/nvidia-uvm:/dev/nvidia-uvm
        nuc-mini:
          ansible_host: 192.168.1.6
          ansible_user: justin
          ansible_port: 6895
          server_role: compute
          known_hosts: nuc
          netdata_role: parent
          # GPU Config
          gpu_type: intel_arc
          gpu_model: arc_graphics # Core Ultra 7 255H Integrated
          docker_gpu: true
          docker_runtime: runc
          docker_devices:
            - /dev/dri:/dev/dri # Intel Arc + QuickSync
          # Capabilities
          has_npu: true
          npu_tops: 96
          supports_av1_encode: true
        mac-mini:
          # ssh known_hosts: `mac`
          ansible_host: 192.168.1.7
          ansible_user: justin
          server_role: deprecated
          known_hosts: mac
          # GPU Config
          gpu_type: apple_silicon
          gpu_model: m4
          docker_gpu: false # macOS doesn't support virtualization in containers
          docker_runtime: runc
          deprecated: true
    
    # Stack-based groups (mini server)
    infra_gateway:
      hosts:
        nuc-mini:
    
    infra_core:
      hosts:
        nuc-mini:
    
    media_acquisition:
      hosts:
        nuc-mini:
    
    media_consumption:
      hosts:
        nuc-mini:

    reading:
      hosts:
        nuc-mini:

    development:
      hosts:
        nuc-mini:
        mac-mini:

    paseo_daemon:
      hosts:
        mac-mini:

    dokploy_host:
      hosts:
        nuc-mini:

    dokploy:
      hosts:
        dokploy-vm:
          ansible_host: 192.168.1.8
          ansible_user: ubuntu
          ansible_port: 22
    
    content_management:
      hosts:
        nuc-mini:
    
    social:
      hosts:
        nuc-mini:
    
    productivity:
      hosts:
        nuc-mini:

    utilities:
      hosts:
        nuc-mini:

    petlibro:
      hosts:
        nuc-mini:

    matrix:
      hosts:
        nuc-mini:

    musicbrainz:
      hosts:
        nuc-mini:

    backup:
      hosts:
        nuc-mini:

    # Stack-based groups (max server)
    ai:
      hosts:
        max:

    infra_periphery:
      hosts:
        max:

    # Stack-based groups (mac mini)
    openclaw:
      hosts:
        mac-mini:

  vars:
    ansible_python_interpreter: /usr/bin/python3
