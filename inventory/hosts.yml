---
all:
  children:
    compute_servers:
      hosts:
        max:
          ansible_host: 192.168.1.100
          ansible_port: 6768
          ansible_user: justin
          server_role: local_llm
          known_hosts: max
          # GPU Config
          # 3x RTX Pro 6000 Blackwell after the 2026-06-01 rebuild:
          #   index 0,1: Max-Q Workstation Edition (300 W) at 21:00 / D1:00
          #   index 2:   full Workstation Edition (600 W) at F1:00
          # See roles/ai/defaults/main.yml ai_gpu_mode for how llama-swap
          # and sglang pin specific cards.
          gpu_type: nvidia
          gpu_model: rtx_pro_6000_blackwell
          gpu_count: 3
          gpu_vram_gb: 288
          docker_gpu: true
          docker_runtime: nvidia
          docker_devices:
            - /dev/nvidia0:/dev/nvidia0
            - /dev/nvidia1:/dev/nvidia1
            - /dev/nvidia2:/dev/nvidia2
            - /dev/nvidiactl:/dev/nvidiactl
            - /dev/nvidia-uvm:/dev/nvidia-uvm
        nuc-mini:
          ansible_host: 192.168.1.6
          ansible_user: justin
          ansible_port: 6895
          server_role: compute
          known_hosts: nuc
          netdata_role: parent
          # GPU Config
          gpu_type: intel_arc
          gpu_model: arc_graphics # Core Ultra 7 255H Integrated
          docker_gpu: true
          docker_runtime: runc
          docker_devices:
            - /dev/dri:/dev/dri # Intel Arc + QuickSync
          # Capabilities
          has_npu: true
          npu_tops: 96
          supports_av1_encode: true
          # Pin traefik to the primary LAN IP so other host services
          # (feederhub's per-feeder ONVIF VIPs at .184/.185) can bind
          # their own :80 listeners on alias IPs without colliding
          # with a 0.0.0.0:80 docker-proxy bind.
          traefik_bind_ip: 192.168.1.6
        mac-mini:
          # ssh known_hosts: `mac`
          ansible_host: 192.168.1.7
          ansible_user: justin
          # Active host (GitLab macOS runner, openclaw, paseo daemon), just
          # not a Docker host. skip_prerequisites keeps it out of the
          # Docker/UFW/NFS prerequisites play (see deploy/prerequisites.yml).
          server_role: macos_native
          known_hosts: mac
          # GPU Config
          gpu_type: apple_silicon
          gpu_model: m4
          docker_gpu: false # macOS doesn't support virtualization in containers
          docker_runtime: runc
          skip_prerequisites: true
    
    # Stack-based groups (mini server)
    infra_gateway:
      hosts:
        nuc-mini:
    
