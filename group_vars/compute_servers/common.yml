---
# Common settings used across all containers
timezone: America/Los_Angeles
puid: "977"
pgid: "988"

# Container restart policy
restart_policy: unless-stopped

# Logging defaults
logging_driver: json-file
logging_max_size: "10m"
logging_max_file: "3"

# Health check defaults
healthcheck_interval: 30s
healthcheck_timeout: 10s
healthcheck_retries: 3
healthcheck_start_period: 30s

# Network names
proxy_network: proxy-network
backend_network: backend-internal
shared_network: shared-network
# Dedicated network for GitLab CI job containers. Non-internal so jobs
# can reach the internet (apk/npm/bundle install), and shared with the
# gitlab container so jobs can clone via http://gitlab without looping
# through Traefik. Kept separate from shared_network to keep job
# containers (arbitrary user code) off the network used by other stacks.
cibuild_network: cibuild-network
