---
# Content Management Stack - Immich, Papra, SongKong
# Uses docker_compose_v2 for container orchestration

- name: Create {{ stack_name }} directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: '0755'
  loop:
    - "{{ docker_base_path }}/{{ stack_name }}"
    - "{{ docker_base_path }}/{{ stack_name }}/env"
    - "{{ docker_base_path }}/{{ stack_name }}/config/homebox"
    - "{{ docker_base_path }}/{{ stack_name }}/album-sort-data"
    - "{{ docker_base_path }}/{{ stack_name }}/album-sort-beets-data"

- name: Create Papra data directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ puid }}"
    group: "{{ pgid }}"
    mode: '0755'
  loop:
    - "{{ docker_base_path }}/{{ stack_name }}/config/papra"
    - "{{ docker_base_path }}/{{ stack_name }}/config/papra/db"
    - "{{ docker_base_path }}/{{ stack_name }}/config/papra/documents"

- name: Pull latest album-sort source
  ansible.builtin.git:
    repo: "{{ album_sort_repo }}"
    dest: "{{ album_sort_source_path }}"
    version: "{{ album_sort_version | default('main') }}"
    force: true
    accept_hostkey: true
  become: false
  notify: Restart {{ stack_name }} stack

- name: Deploy compose file
  template:
    src: compose.yaml.j2
    dest: "{{ docker_base_path }}/{{ stack_name }}/compose.yaml"
    owner: "{{ ansible_user }}"
    mode: '0644'
  notify: Restart {{ stack_name }} stack

- name: Deploy environment files
  template:
    src: "env/{{ item }}.env.j2"
    dest: "{{ docker_base_path }}/{{ stack_name }}/env/{{ item }}.env"
    owner: "{{ ansible_user }}"
    mode: '0600'
  loop:
    - immich
    - papra
    - homebox
    - album-sort
  no_log: true
  notify: Restart {{ stack_name }} stack

- name: Deploy {{ stack_name }} stack
  community.docker.docker_compose_v2:
    project_src: "{{ docker_base_path }}/{{ stack_name }}"
    state: present
    remove_orphans: true
    build: always
    pull: "{{ docker_pull_policy | default('missing') }}"
  register: compose_result
