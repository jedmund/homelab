---
# Stack identity
stack_name: content-management
config_base: "{{ docker_base_path }}/{{ stack_name }}"

# Immich settings
immich_version: release
immich_server_image: "ghcr.io/immich-app/immich-server:{{ immich_version }}"
immich_ml_image: "ghcr.io/immich-app/immich-machine-learning:{{ immich_version }}"
immich_db_image: "ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23"
immich_redis_image: "docker.io/valkey/valkey:9@sha256:fb8d272e529ea567b9bf1302245796f21a2672b8368ca3fcb938ac334e613c8f"
immich_port: 2283
immich_server_url: "https://photos.atelier.house"

# Immich database
immich_db_hostname: immich-database
immich_db_username: postgres
immich_db_name: immich
immich_redis_hostname: immich-redis

# Papra settings
papra_image: ghcr.io/papra-hq/papra:latest
papra_port: 1221
papra_external_port: 8787
papra_base_url: "https://docs.atelier.house"
papra_process_mode: all
papra_database_url: "file:/app/app-data/db/db.sqlite"
papra_storage_driver: filesystem
papra_storage_root: /app/app-data/documents
papra_registration_enabled: "false"
papra_first_user_admin: "true"
papra_ocr_languages: eng

# Papra OIDC
papra_oidc_provider_id: pocketid
papra_oidc_provider_name: PocketID
papra_oidc_discovery_url: "https://id.atelier.house/.well-known/openid-configuration"
papra_oidc_scopes:
  - openid
  - profile
  - email

# Homebox settings
homebox_image: ghcr.io/sysadminsmedia/homebox:latest
homebox_port: "7745"
homebox_external_port: 3100
homebox_domain: "box.atelier.house"
homebox_log_level: "info"
homebox_log_format: "text"
homebox_max_upload_size: "10"
homebox_allow_analytics: "false"
homebox_allow_registration: "true"
homebox_trust_proxy: "true"
homebox_allow_local_login: "false"

# Homebox OIDC
homebox_oidc_enabled: "true"
homebox_oidc_issuer_url: "https://id.atelier.house"
homebox_oidc_scope: "openid profile email"
homebox_oidc_button_text: "Sign in with PocketID"
homebox_oidc_auto_redirect: "false"
homebox_oidc_verify_email: "false"

# SongKong settings
songkong_image: songkong/songkong:latest
songkong_port: 4567

# Manga Manager (metadata editor for the comics volume)
# Upstream warns the image ships with passwordless sudo; keep behind tinyauth.
manga_manager_image: thepromidius/manga-manager:latest
manga_manager_port: 3000
manga_manager_external_port: 3110
manga_manager_domain: "manga.sort.atelier.house"
manga_manager_title: "Manga Manager"
manga_manager_umask: "022"
manga_manager_keyboard: "en-us-qwerty"
manga_manager_subfolder: "/"

# Album Sort (in-house app, built from source)
album_sort_repo: ssh://git@git.atelier.house:2222/jedmund/album-sort.git
album_sort_version: main
album_sort_source_path: /home/justin/album-sort
album_sort_port: 5180
album_sort_container_port: 3000
album_sort_domain: music.sort.atelier.house
album_sort_origin: "https://{{ album_sort_domain }}"
album_sort_unsorted_path: /music/Sort
album_sort_sorted_path: /music/Sorted
album_sort_data_path: /data
album_sort_watch_interval: "30000"
# Multi-Scrobbler integration
album_sort_multi_scrobbler_url: "http://multi-scrobbler:9078"

# Secrets defined in vault:
# album_sort_apple_music_team_id, album_sort_apple_music_key_id,
# album_sort_apple_music_private_key, album_sort_discogs_token,
# album_sort_kagi_api_key, album_sort_multi_scrobbler_token

# Dawarich settings (location timeline)
dawarich_image: freikin/dawarich:latest
dawarich_external_port: 3030
dawarich_domain: "where.atelier.house"
dawarich_base_url: "https://{{ dawarich_domain }}"
dawarich_self_hosted: "true"
dawarich_store_geodata: "true"
dawarich_rails_env: production
dawarich_log_to_stdout: "true"
dawarich_background_processing_concurrency: "5"

# Dawarich database (PostGIS, required for geospatial queries)
dawarich_db_image: postgis/postgis:17-3.5-alpine
dawarich_db_host: dawarich-db
dawarich_db_port: "5432"
dawarich_db_username: dawarich
dawarich_db_name: dawarich_production

# Dawarich Redis
dawarich_redis_image: redis:7.4-alpine
dawarich_redis_host: dawarich-redis
dawarich_redis_url: "redis://{{ dawarich_redis_host }}:6379"

# Dawarich OIDC (PocketID)
dawarich_oidc_provider_name: PocketID
dawarich_oidc_issuer: "https://id.atelier.house"
dawarich_oidc_redirect_uri: "{{ dawarich_base_url }}/users/auth/openid_connect/callback"
dawarich_oidc_auto_register: "true"
dawarich_allow_email_password_registration: "false"
# 1.7.8+: login is gated separately from registration; defaults true upstream
dawarich_allow_email_password_login: "false"

# Dawarich SMTP (SendGrid via shared key from compute_servers vault)
dawarich_smtp_server: smtp.sendgrid.net
dawarich_smtp_port: "587"
dawarich_smtp_username: apikey
dawarich_smtp_from: "noreply@atelier.house"
dawarich_smtp_domain: "atelier.house"
dawarich_smtp_starttls: "true"
dawarich_smtp_authentication: plain

# Dawarich Photon (self-hosted worldwide reverse geocoder, ~90 GB on disk)
dawarich_photon_image: rtuszik/photon-docker:latest
dawarich_photon_region: planet
dawarich_photon_initial_download: "TRUE"
dawarich_photon_api_host: "dawarich-photon:2322"
dawarich_photon_api_use_https: "false"

# Dawarich secrets defined in vault:
# dawarich_db_password, dawarich_secret_key_base
# dawarich_oidc_client_id, dawarich_oidc_client_secret
# sendgrid_api_key (shared across stacks, defined in compute_servers vault)
