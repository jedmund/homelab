---
# Stack identity
stack_name: development
config_base: "{{ docker_base_path }}/{{ stack_name }}"

# Server IPs
# Sourced from inventory so the IP is only ever defined in one place.
max_server_ip: "{{ hostvars['max'].ansible_host }}"

# Vault secrets consumed by this role:
#   open_webui_secret_key, open_webui_oauth_client_id, open_webui_oauth_client_secret
#   gitlab_initial_root_password
#   gitlab_oidc_client_id, gitlab_oidc_client_secret
#   gitlab_runner_auth_token
#   renovate_gitlab_token, renovate_github_token (optional)

# GitLab CE settings
gitlab_image: gitlab/gitlab-ce:17.5.2-ce.0
gitlab_domain: git.atelier.house
gitlab_registry_domain: registry.atelier.house
gitlab_ssh_port: "2222"
gitlab_web_port: 80
gitlab_registry_port: 5050
gitlab_root_url: "https://{{ gitlab_domain }}"
gitlab_registry_url: "https://{{ gitlab_registry_domain }}"
gitlab_shm_size: "256m"
# All four below come from vault once configured. Empty defaults let the
# first deploy succeed; GitLab generates its own initial root password
# (logged at /etc/gitlab/initial_root_password inside the container) if
# the env var is empty, and OIDC just won't work until PocketID client
# creds are populated.
gitlab_initial_root_password: ""
gitlab_oidc_client_id: ""
gitlab_oidc_client_secret: ""

# GitLab Runner settings
gitlab_runner_image: gitlab/gitlab-runner:v17.5.2
gitlab_runner_name: nuc-mini-docker
gitlab_runner_concurrent: 4
gitlab_runner_default_image: alpine:latest
gitlab_runner_log_level: info
# Runner reaches GitLab over the backend docker network rather than out
# through Traefik (mirrors renovate_endpoint below). Without this the
# runner resolves git.atelier.house to the GitLab container's backend
# IP via the container hostname, but tries port 443 — TLS terminates at
# Traefik, GitLab itself only listens on 80 internally, so every job
# poll fails with "connection refused". Also used as clone_url so the
# job containers spawned on backend network clone via the internal URL.
gitlab_runner_url: "http://gitlab"
# Generated in GitLab admin UI after first GitLab boot, then added to
# vault. Empty default lets the first deploy render config.toml without
# failing; runner will log auth errors until the token is populated.
gitlab_runner_auth_token: ""

# Renovate settings
renovate_image: renovate/renovate:39
renovate_log_level: info
renovate_platform: gitlab
# Hits GitLab over the backend docker network rather than out through
# Traefik. GitLab's external_url still controls URLs in API responses,
# so MR links etc. continue to point at git.atelier.house.
renovate_endpoint: "http://gitlab/api/v4/"
renovate_git_author: "Renovate Bot <renovate-bot@{{ gitlab_domain }}>"
renovate_autodiscover: "true"
renovate_onboarding: "true"
renovate_schedule_cron: "0 8 * * 1"  # Mondays 08:00 local
# Created on a dedicated `renovate-bot` GitLab user after GitLab is up.
# Empty default so templating works on first deploy; the weekly cron
# will no-op (or noisily fail) until the vault entry is populated.
renovate_gitlab_token: ""

# GitLab backup dump (consumed by borgmatic's /opt/docker source path).
# Runs shortly before borgmatic's nightly cron (02:00) to give large
# instances headroom. SKIP=registry,artifacts keeps the dump small;
# raw registry blobs are recoverable from the filesystem path.
gitlab_backup_cron: "50 1 * * *"
gitlab_backup_skip: "registry,artifacts"

# Open WebUI settings
open_webui_image: ghcr.io/open-webui/open-webui:main
open_webui_domain: ai.atelier.house
open_webui_port: 8080
open_webui_host_port: 8080
open_webui_ollama_base_url: "http://{{ max_server_ip }}:11434"
open_webui_openai_api_base_url: "http://{{ max_server_ip }}:11434/v1"
open_webui_auth: "true"
open_webui_url: "https://{{ open_webui_domain }}"
open_webui_oauth_signup: "true"
open_webui_oauth_merge_accounts: "true"
open_webui_oauth_provider_name: PocketID
open_webui_oidc_provider_url: "https://id.atelier.house/.well-known/openid-configuration"
open_webui_oauth_scopes: "openid email profile"

# Voice + web-search wiring for OpenWebUI. Services run in the `ai` stack
# on max; OpenWebUI connects to them over the LAN via their published
# host ports. Keep these ports in sync with roles/ai/defaults/main.yml.
open_webui_whisper_port: 9000
open_webui_kokoro_port: 8880
open_webui_searxng_port: 8889
open_webui_audio_stt_base_url: "http://{{ max_server_ip }}:{{ open_webui_whisper_port }}/v1"
open_webui_audio_tts_base_url: "http://{{ max_server_ip }}:{{ open_webui_kokoro_port }}/v1"
open_webui_audio_tts_voice: af_sky
open_webui_searxng_query_url: "http://{{ max_server_ip }}:{{ open_webui_searxng_port }}/search?q=<query>&format=json"

# Playwright sidecar (also in the ai stack on max). Without this,
# OpenWebUI falls back to LangChain's httpx-based WebBaseLoader, which
# every modern site blocks; the symptom is "No sources found" after a
# successful search because all page fetches returned 0 bytes. Keep
# this port in sync with playwright_port in roles/ai/defaults/main.yml.
# Note: WEB_LOADER_ENGINE and PLAYWRIGHT_WS_URL are PersistentConfig in
# OpenWebUI — env vars only seed the value on a fresh database. On an
# existing install, set them once via Admin -> Settings -> Documents or
# do a one-shot restart with RESET_CONFIG_ON_START=true to re-seed.
open_webui_playwright_port: 3000
open_webui_web_loader_engine: playwright
open_webui_playwright_ws_url: "ws://{{ max_server_ip }}:{{ open_webui_playwright_port }}"

# RAG embeddings via TEI on max. OpenWebUI's RAG_* env vars only seed
# initial values on a fresh database; existing embeddings remain on
# whatever model they were created with, so changing the model here
# requires resetting OpenWebUI's vector store (Admin -> Documents) and
# re-ingesting before new docs use the new embedding space.
open_webui_tei_port: 11435
open_webui_rag_embedding_base_url: "http://{{ max_server_ip }}:{{ open_webui_tei_port }}/v1"
# TEI ignores the `model` field in OpenAI-format requests for single-model
# containers (the one loaded model always answers), so this string is
# effectively a label for OpenWebUI's UI/logs. Set to match the served
# model for clarity.
open_webui_rag_embedding_model: Qwen3-Embedding-0.6B

# Paseo relay settings
# Self-hosted WS relay between the Paseo daemon (running on dev machines)
# and the mobile/web clients. Zero-knowledge: traffic is E2E encrypted
# with NaCl box, so the relay never sees payload content. No auth at the
# edge by design; Traefik just terminates TLS and proxies the WS upgrade.
paseo_relay_image: ghcr.io/zenghongtu/paseo-relay:0.5.0
paseo_relay_domain: paseo.relay.atelier.house
paseo_relay_port: 8411

# Vane (https://github.com/ItzCrazyKns/Vane)
# Self-hosted Perplexity-style AI answering engine: chats against the
# llama-swap / vLLM endpoints on max with SearXNG-backed web search.
# Upstream has no auth (their roadmap calls it out as todo), so we sit
# it behind tinyauth via the Traefik middleware. See
# [[project-vane-oidc-fork-followup]] for the plan to add native OIDC
# in a fork once the rafaelfiguereod-stack login PR lands.
vane_image: itzcrazykns1337/vane:latest
vane_domain: vane.atelier.house
vane_port: 3000
# Point Vane at max's SearXNG (same instance Odysseus and OpenWebUI use)
# instead of the bundled one in the Vane image. The bundled one will
# still start (we can't disable it without patching the upstream
# entrypoint) but Vane reads SEARXNG_API_URL and goes to max, so the
# bundled instance is dead weight rather than a working dependency.
vane_searxng_url: "http://{{ max_server_ip }}:{{ open_webui_searxng_port }}"

# Odysseus (https://github.com/pewdiepie-archdaemon/odysseus)
# Self-hosted ChatGPT-style workspace with chat, agents, deep research,
# email triage, calendar sync, document editing. Upstream has its own
# local-account auth; we disable it (AUTH_ENABLED=false) and let
# tinyauth be the only gate. Image is built in-place because upstream
# does not publish one; the repo is cloned to
# {{ config_base }}/odysseus-src and docker compose builds from there.
odysseus_repo_url: https://github.com/pewdiepie-archdaemon/odysseus.git
odysseus_repo_version: main
odysseus_domain: odysseus.atelier.house
odysseus_port: 7000
# Reuse max's SearXNG instance (also used by OpenWebUI and the ai stack)
# instead of running a per-stack SearXNG. ChromaDB and ntfy are
# bundled below because each Odysseus install wants its own.
odysseus_searxng_url: "http://{{ max_server_ip }}:{{ open_webui_searxng_port }}"

# ChromaDB bundled with Odysseus. Vector store for Odysseus's memory /
# RAG features. Kept on the internal `backend` network so it is only
# reachable from Odysseus, never exposed to Traefik.
odysseus_chromadb_image: chromadb/chroma:latest
odysseus_chromadb_host: odysseus-chromadb
odysseus_chromadb_port: 8000

# ntfy bundled with Odysseus. Push-notification backend the upstream
# compose ships with; left unexposed (localhost-only on the host)
# matching the upstream default. Odysseus reaches it by container
# name when configured in its UI; flip to a Traefik route later if
# you want phone push.
odysseus_ntfy_image: binwiederhier/ntfy
odysseus_ntfy_base_url: "http://localhost:8091"

# Odysseus's entrypoint drops to PUID:PGID before running uvicorn and
# chowns its bind-mounted data dirs to match. Override these only if
# the host user that should own ./odysseus/data isn't uid 1000.
# (Note: the stack-wide `puid`/`pgid` in group_vars/compute_servers
# are the LinuxServer.io media-service uid/gid, which is the wrong
# answer here.)
odysseus_puid: 1000
odysseus_pgid: 1000
