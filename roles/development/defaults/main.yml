---
# Stack identity
stack_name: development
config_base: "{{ docker_base_path }}/{{ stack_name }}"

# Server IPs
max_server_ip: 192.168.1.245

# Forgejo settings
forgejo_image: codeberg.org/forgejo/forgejo:15.0.0
forgejo_domain: git.atelier.house
forgejo_ssh_port: 2222
forgejo_web_port: 3000
forgejo_host_port: 3030
forgejo_user_uid: "1000"
forgejo_user_gid: "1000"
forgejo_root_url: "https://{{ forgejo_domain }}"
forgejo_ssh_listen_port: "2222"
forgejo_openid_signin_enabled: "false"
forgejo_openid_signup_enabled: "false"
forgejo_oauth2_auto_registration: "true"
forgejo_oauth2_account_linking: auto
forgejo_oauth2_username: email
forgejo_disable_registration: "false"
forgejo_require_signin_view: "false"

# Forgejo database
forgejo_db_image: postgres:16-alpine
forgejo_db_host: forgejo-db
forgejo_db_port: "5432"
forgejo_db_name: forgejo
forgejo_db_user: forgejo

# Vault secrets consumed by this role:
#   forgejo_db_password
#   open_webui_secret_key, open_webui_oauth_client_id, open_webui_oauth_client_secret
#   gitlab_initial_root_password
#   gitlab_oidc_client_id, gitlab_oidc_client_secret
#   gitlab_runner_auth_token
#   renovate_gitlab_token, renovate_github_token (optional)

# GitLab CE settings
gitlab_image: gitlab/gitlab-ce:17.5.2-ce.0
gitlab_domain: gitlab.atelier.house
gitlab_registry_domain: registry.atelier.house
gitlab_ssh_port: "2223"
gitlab_web_port: 80
gitlab_registry_port: 5050
gitlab_root_url: "https://{{ gitlab_domain }}"
gitlab_registry_url: "https://{{ gitlab_registry_domain }}"
gitlab_shm_size: "256m"
# All four below come from vault once configured. Empty defaults let the
# first deploy succeed; GitLab generates its own initial root password
# (logged at /etc/gitlab/initial_root_password inside the container) if
# the env var is empty, and OIDC just won't work until PocketID client
# creds are populated.
gitlab_initial_root_password: ""
gitlab_oidc_client_id: ""
gitlab_oidc_client_secret: ""

# GitLab Runner settings
gitlab_runner_image: gitlab/gitlab-runner:v17.5.2
gitlab_runner_name: nuc-mini-docker
gitlab_runner_concurrent: 4
gitlab_runner_default_image: alpine:latest
gitlab_runner_log_level: info
# Generated in GitLab admin UI after first GitLab boot, then added to
# vault. Empty default lets the first deploy render config.toml without
# failing; runner will log auth errors until the token is populated.
gitlab_runner_auth_token: ""

# Renovate settings
renovate_image: renovate/renovate:39
renovate_log_level: info
renovate_platform: gitlab
# Hits GitLab over the backend docker network rather than out through
# Traefik. GitLab's external_url still controls URLs in API responses,
# so MR links etc. continue to point at gitlab.atelier.house.
renovate_endpoint: "http://gitlab/api/v4/"
renovate_git_author: "Renovate Bot <renovate-bot@{{ gitlab_domain }}>"
renovate_autodiscover: "true"
renovate_onboarding: "true"
renovate_schedule_cron: "0 8 * * 1"  # Mondays 08:00 local
# Created on a dedicated `renovate-bot` GitLab user after GitLab is up.
# Empty default so templating works on first deploy; the weekly cron
# will no-op (or noisily fail) until the vault entry is populated.
renovate_gitlab_token: ""

# GitLab backup dump (consumed by borgmatic's /opt/docker source path).
# Runs shortly before borgmatic's nightly cron (02:00) to give large
# instances headroom. SKIP=registry,artifacts keeps the dump small;
# raw registry blobs are recoverable from the filesystem path.
gitlab_backup_cron: "50 1 * * *"
gitlab_backup_skip: "registry,artifacts"

# Open WebUI settings
open_webui_image: ghcr.io/open-webui/open-webui:main
open_webui_domain: ai.atelier.house
open_webui_port: 8080
open_webui_host_port: 8080
open_webui_ollama_base_url: "http://{{ max_server_ip }}:11434"
open_webui_openai_api_base_url: "http://{{ max_server_ip }}:11434/v1"
open_webui_auth: "true"
open_webui_url: "https://{{ open_webui_domain }}"
open_webui_oauth_signup: "true"
open_webui_oauth_merge_accounts: "true"
open_webui_oauth_provider_name: PocketID
open_webui_oidc_provider_url: "https://id.atelier.house/.well-known/openid-configuration"
open_webui_oauth_scopes: "openid email profile"
