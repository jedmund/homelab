---
# Plane Community Edition stack

- name: Create {{ stack_name }} directory
  ansible.builtin.file:
    path: "{{ config_base }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: '0755'

- name: Deploy compose file
  ansible.builtin.template:
    src: compose.yaml.j2
    dest: "{{ config_base }}/compose.yaml"
    owner: "{{ ansible_user }}"
    mode: '0644'
  notify: Restart {{ stack_name }} stack

- name: Deploy environment file
  ansible.builtin.template:
    src: plane.env.j2
    dest: "{{ config_base }}/.env"
    owner: "{{ ansible_user }}"
    mode: '0600'
  no_log: true
  notify: Restart {{ stack_name }} stack

- name: Deploy {{ stack_name }} stack
  community.docker.docker_compose_v2:
    project_src: "{{ config_base }}"
    state: present
    remove_orphans: true
    pull: "{{ docker_pull_policy | default('missing') }}"
  register: compose_result
