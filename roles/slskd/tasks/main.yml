---
# slskd product stack

- name: Create {{ stack_name }} directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: '0755'
  loop:
    - "{{ docker_base_path }}/{{ stack_name }}"
    - "{{ docker_base_path }}/{{ stack_name }}/env"
    - "{{ docker_base_path }}/{{ stack_name }}/config"

- name: Create slskd download directories in downloads volume
  ansible.builtin.command:
    argv:
      - docker
      - run
      - --rm
      - -v
      - downloads:/downloads
      - alpine:3.20
      - sh
      - -c
      - mkdir -p /downloads/music /downloads/music/.incomplete
  changed_when: false

- name: Deploy compose file
  ansible.builtin.template:
    src: compose.yaml.j2
    dest: "{{ docker_base_path }}/{{ stack_name }}/compose.yaml"
    owner: "{{ ansible_user }}"
    mode: '0644'
  notify: Restart {{ stack_name }} stack

- name: Deploy slskd configuration file
  ansible.builtin.template:
    src: slskd.yml.j2
    dest: "{{ docker_base_path }}/{{ stack_name }}/config/slskd.yml"
    owner: "{{ ansible_user }}"
    mode: '0644'
  notify: Restart {{ stack_name }} stack

- name: Deploy environment file
  ansible.builtin.template:
    src: env/slskd.env.j2
    dest: "{{ docker_base_path }}/{{ stack_name }}/env/slskd.env"
    owner: "{{ ansible_user }}"
    mode: '0600'
  no_log: true
  notify: Restart {{ stack_name }} stack

- name: Deploy {{ stack_name }} stack
  community.docker.docker_compose_v2:
    project_src: "{{ docker_base_path }}/{{ stack_name }}"
    state: present
    remove_orphans: true
    pull: "{{ docker_pull_policy | default('missing') }}"
  register: compose_result
