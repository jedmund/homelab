---
# Openclaw (native macOS install on mac-mini).
# Onboarding (`openclaw onboard --install-daemon`) is interactive and
# must be run once by hand on the mac-mini after this role runs. See
# roles/openclaw/README.md for the full bring-up sequence.

- name: Check for Homebrew (Apple Silicon prefix)
  ansible.builtin.stat:
    path: /opt/homebrew/bin/brew
  register: _brew_apple_silicon

- name: Check for Homebrew (Intel prefix)
  ansible.builtin.stat:
    path: /usr/local/bin/brew
  register: _brew_intel

- name: Bootstrap Homebrew if missing
  # NONINTERACTIVE=1 skips the "press RETURN" prompts. The installer still
  # calls sudo to create /opt/homebrew and chown it to the SSH user, so
  # that user needs (passwordless) sudo for this to complete unattended.
  ansible.builtin.shell: |
    /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
  environment:
    NONINTERACTIVE: "1"
  when:
    - not _brew_apple_silicon.stat.exists
    - not _brew_intel.stat.exists

- name: Install Node {{ openclaw_node_formula }} via Homebrew
  community.general.homebrew:
    name: "{{ openclaw_node_formula }}"
    state: present

- name: Resolve {{ openclaw_node_formula }} bin path
  ansible.builtin.command: "brew --prefix {{ openclaw_node_formula }}"
  register: _node_prefix
  changed_when: false

- name: Install openclaw globally via npm
  community.general.npm:
    name: openclaw
    state: latest
    global: true
    executable: "{{ _node_prefix.stdout }}/bin/npm"

- name: Ensure openclaw config directory exists
  ansible.builtin.file:
    path: "{{ openclaw_config_dir }}"
    state: directory
    mode: '0700'

- name: Template openclaw service env file
  # Channel secrets (Discord bot token, etc.) live here and are resolved
  # by openclaw.json at startup via { source: "env", id: "<NAME>" }.
  ansible.builtin.template:
    src: env/openclaw.env.j2
    dest: "{{ openclaw_config_dir }}/.env"
    mode: '0600'
    backup: true
  no_log: true
  register: _openclaw_env

- name: Template openclaw config
  ansible.builtin.template:
    src: openclaw.json.j2
    dest: "{{ openclaw_config_file }}"
    mode: '0600'
    backup: true
  register: _openclaw_config

- name: Reminder if config or env changed
  ansible.builtin.debug:
    msg: >
      Openclaw config or env was updated. If the gateway daemon is
      already installed, restart it on the mac-mini with:
      `launchctl kickstart -k gui/$(id -u)/ai.openclaw.gateway`
      (substitute the actual label from
      `launchctl list | grep -i openclaw` if different).
  when: _openclaw_config.changed or _openclaw_env.changed
