---
# Openclaw (native macOS install on mac-mini).
# Onboarding (`openclaw onboard --install-daemon`) is interactive and
# must be run once by hand on the mac-mini after this role runs. See
# roles/openclaw/README.md for the full bring-up sequence.

- name: Ensure Homebrew is installed
  ansible.builtin.command: brew --version
  register: _brew_check
  changed_when: false
  failed_when: _brew_check.rc != 0

- name: Install Node {{ openclaw_node_formula }} via Homebrew
  community.general.homebrew:
    name: "{{ openclaw_node_formula }}"
    state: present

- name: Resolve Homebrew prefix
  ansible.builtin.command: brew --prefix
  register: _brew_prefix
  changed_when: false

- name: Resolve {{ openclaw_node_formula }} bin path
  ansible.builtin.command: "brew --prefix {{ openclaw_node_formula }}"
  register: _node_prefix
  changed_when: false

- name: Install openclaw globally via npm
  community.general.npm:
    name: openclaw
    state: latest
    global: true
    executable: "{{ _node_prefix.stdout }}/bin/npm"

- name: Ensure openclaw config directory exists
  ansible.builtin.file:
    path: "{{ openclaw_config_dir }}"
    state: directory
    mode: '0700'

- name: Template openclaw config
  ansible.builtin.template:
    src: openclaw.json.j2
    dest: "{{ openclaw_config_file }}"
    mode: '0600'
    backup: true
  register: _openclaw_config

- name: Reminder if config changed
  ansible.builtin.debug:
    msg: >
      Openclaw config was updated. If the gateway daemon is already
      installed, restart it on the mac-mini with:
      `launchctl kickstart -k gui/$(id -u)/ai.openclaw.gateway`
      (substitute the actual label from
      `launchctl list | grep -i openclaw` if different).
  when: _openclaw_config.changed
