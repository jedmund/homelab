---
# Openclaw runs natively on macOS (mac-mini) so it can access iMessage,
# Spark Desktop's MCP, Apple Notes/Calendar/Reminders, etc. Not Docker.

# Stack identity
stack_name: openclaw

# Node runtime (installed via Homebrew). Openclaw recommends Node 24.
openclaw_node_formula: node@24

# Gateway listen port (Openclaw default)
openclaw_port: 18789

# Config directory and file (JSON5)
# Path is relative to the SSH user's home (resolved at runtime via
# ansible_user_dir so the role doesn't hardcode /Users/justin).
openclaw_config_dir: "{{ ansible_user_dir }}/.openclaw"
openclaw_config_file: "{{ openclaw_config_dir }}/openclaw.json"

# Sandbox mode: off | non-main | all
# Per deploy decision: this is a personal mac with no sensitive files
# beyond the user's, so we trust exec on the host and skip the Docker
# sandbox overhead (Docker on macOS runs in a Linux VM).
openclaw_sandbox_mode: "off"

# Model backend: point at llama-swap on max over the LAN.
# llama_swap_port (11434) is duplicated from roles/ai/defaults/main.yml
# because the ai role's vars aren't in scope from this role.
openclaw_local_llm_base_url: "http://{{ hostvars['max'].ansible_host }}:11434/v1"
# Default is minimax-m27-q4 to piggyback on the coding workload (already
# resident most of the day) and avoid the ~125s cold-load tax that comes
# with the chat group's swap policy. minimax is text-only though, so
# qwen3.6-flash is declared as a secondary for opt-in vision tasks
# (iMessage photos, screenshots). Using qwen3.6-flash will evict minimax,
# but the 2h ai_model_default_ttl keeps thrash bounded once a session
# settles. See roles/ai/defaults/main.yml for the full model catalogue
# and the chat group's swap policy.
openclaw_local_llm_default_model: "minimax-m27-q4"
# Vision-capable model. Openclaw's agents.defaults.imageModel routes
# image-bearing turns to this model automatically (see
# https://docs.openclaw.ai/gateway/config-agents) so text-only chatter
# stays on the resident minimax model and only a turn with an actual
# attachment pays the swap tax.
openclaw_local_llm_vision_model: qwen3.6-flash

# Custom (non-bundled) providers must declare which models they expose,
# or openclaw rejects the config at startup. Each entry maps to a model
# object in openclaw.json under models.providers.local.models[]. Fields:
#   id            llama-swap model name (must match roles/ai/defaults).
#   name          display label for Openclaw's model picker.
#   input         ["text"] or ["text", "image"] for multimodal.
#   contextWindow per-slot context (chat group uses 64K-per-slot sticky).
#   maxTokens     generation cap per response.
# All other fields (cost, reasoning) are emitted as zeros/false by the
# template since these are local models with no per-token pricing.
openclaw_local_llm_models:
  - id: minimax-m27-q4
    name: "MiniMax M2.7 (Q4_K_XL)"
    input: ["text"]
    contextWindow: 65536
    maxTokens: 8192
  - id: qwen3.6-flash
    name: "Qwen3.6 Flash 35B-A3B (multimodal)"
    input: ["text", "image"]
    contextWindow: 65536
    maxTokens: 8192

# Discord channel. Configured for personal use: DMs from a single user
# only, no server (guild) traffic, no voice. The Discord bot itself must
# be created out of band at the Discord Developer Portal; the user/app
# IDs and bot token come from vault (see roles/openclaw/README.md for
# the full bring-up). Set openclaw_discord_enabled: false to skip the
# channel block (config still validates without Discord).
#
# Required vault entries when enabled:
#   vault_openclaw_discord_bot_token       bot token from the Bot tab
#   vault_openclaw_discord_user_id         your Discord user ID (snowflake)
#   vault_openclaw_discord_application_id  application/client ID (startup hint)
openclaw_discord_enabled: true
openclaw_discord_bot_token: "{{ vault_openclaw_discord_bot_token }}"
openclaw_discord_user_id: "{{ vault_openclaw_discord_user_id }}"
openclaw_discord_application_id: "{{ vault_openclaw_discord_application_id }}"

# Google Places API key for the `goplaces` skill (Google Maps lookups).
# Get a key at console.cloud.google.com (enable the Places API, then
# create an API key and restrict it to Places API). The env var is
# loaded by the gateway daemon at startup; the openclaw skill picks it
# up automatically. Set openclaw_goplaces_enabled: false to omit the
# var (useful if the skill is disabled or the brew binary isn't
# installed yet).
#
# Required vault entry when enabled:
#   vault_openclaw_google_places_api_key   Places API key (treat as secret)
openclaw_goplaces_enabled: true
openclaw_google_places_api_key: "{{ vault_openclaw_google_places_api_key }}"
