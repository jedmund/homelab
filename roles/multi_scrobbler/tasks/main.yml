---
# Multi-Scrobbler product stack

- name: Create {{ stack_name }} directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: '0755'
  loop:
    - "{{ docker_base_path }}/{{ stack_name }}"
    - "{{ docker_base_path }}/{{ stack_name }}/config"

- name: Reset multi-scrobbler dead-letter cache
  # One-shot: an upstream multi-scrobbler bug (`Cannot read properties of
  # undefined (reading 'normalize')`) crashes the dead-letter retry path,
  # wedging any plays it contains. Run this task with the
  # `multi-scrobbler-reset` tag to clear the cache; on subsequent normal
  # deploys it's a no-op (file already absent or healthy).
  ansible.builtin.file:
    path: "{{ docker_base_path }}/{{ stack_name }}/config/ms-scrobble.cache"
    state: absent
  notify: Restart {{ stack_name }} stack
  tags:
    - never
    - multi-scrobbler-reset

- name: Deploy multi-scrobbler config
  ansible.builtin.template:
    src: config/multi-scrobbler/config.json.j2
    dest: "{{ docker_base_path }}/{{ stack_name }}/config/config.json"
    owner: "{{ ansible_user }}"
    mode: '0600'
  no_log: true
  notify: Restart {{ stack_name }} stack

- name: Deploy compose file
  ansible.builtin.template:
    src: compose.yaml.j2
    dest: "{{ docker_base_path }}/{{ stack_name }}/compose.yaml"
    owner: "{{ ansible_user }}"
    mode: '0644'
  notify: Restart {{ stack_name }} stack

- name: Deploy {{ stack_name }} stack
  community.docker.docker_compose_v2:
    project_src: "{{ docker_base_path }}/{{ stack_name }}"
    state: present
    remove_orphans: true
    pull: "{{ docker_pull_policy | default('missing') }}"
  register: compose_result
