---
# Stack identity
stack_name: utilities
config_base: "{{ docker_base_path }}/{{ stack_name }}"

# n8n settings (moved from development)
# Fork image with the self-hosted-SSO unlock patch (see jedmund/n8n@jedmund/sso-pocketid).
n8n_image: ghcr.io/jedmund/n8n:sso-pocketid
n8n_domain: n8n.atelier.house
n8n_port: 5678
n8n_host_port: 5678
n8n_protocol: https
n8n_webhook_url: "https://{{ n8n_domain }}/"
n8n_user_management_disabled: "false"
# Unlocks enterprise features on the fork image without a license:
# OIDC SSO, Sharing, Log Streaming, Environments (source control),
# External Secrets, and the three Project Roles (admin/editor/viewer).
# OIDC client (PocketID at https://id.atelier.house) is configured via the
# in-app SSO settings UI at https://{{ n8n_domain }}/settings/sso.
# Redirect URI to register in PocketID: https://{{ n8n_domain }}/rest/sso/oidc/callback
n8n_self_hosted_features_enabled: "true"
# Number of reverse proxy hops in front of n8n (Traefik = 1). Needed for
# n8n to trust X-Forwarded-* headers — without it the OIDC callback's
# state/nonce cookies fail to round-trip and SSO sign-in silently breaks.
n8n_proxy_hops: "1"

# n8n database
n8n_db_image: postgres:16-alpine
n8n_db_host: n8n-db
n8n_db_port: "5432"
n8n_db_name: n8n
n8n_db_user: n8n

# ChangeDetection.io settings
changedetection_image: ghcr.io/dgtlmoon/changedetection.io:latest
changedetection_domain: track.atelier.house
changedetection_port: 5000

# Copyparty settings
copyparty_image: copyparty/ac
copyparty_domain: files.atelier.house
copyparty_port: 3923

