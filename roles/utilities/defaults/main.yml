---
# Stack identity
stack_name: utilities
config_base: "{{ docker_base_path }}/{{ stack_name }}"

# n8n settings (moved from development)
# Fork image with the self-hosted-SSO unlock patch (see jedmund/n8n@jedmund/sso-pocketid).
n8n_image: ghcr.io/jedmund/n8n:sso-pocketid
n8n_domain: n8n.atelier.house
n8n_port: 5678
n8n_host_port: 5678
n8n_protocol: https
n8n_webhook_url: "https://{{ n8n_domain }}/"
n8n_user_management_disabled: "false"
# Unlocks enterprise features on the fork image without a license:
# OIDC SSO, Sharing, Log Streaming, Environments (source control),
# External Secrets, and the three Project Roles (admin/editor/viewer).
# OIDC client (PocketID at https://id.atelier.house) is configured via the
# in-app SSO settings UI at https://{{ n8n_domain }}/settings/sso.
# Redirect URI to register in PocketID: https://{{ n8n_domain }}/rest/sso/oidc/callback
n8n_self_hosted_features_enabled: "true"
# Number of reverse proxy hops in front of n8n (Traefik = 1). Needed for
# n8n to trust X-Forwarded-* headers — without it the OIDC callback's
# state/nonce cookies fail to round-trip and SSO sign-in silently breaks.
n8n_proxy_hops: "1"

# n8n database
n8n_db_image: postgres:16-alpine
n8n_db_host: n8n-db
n8n_db_port: "5432"
n8n_db_name: n8n
n8n_db_user: n8n

# ChangeDetection.io settings
changedetection_image: ghcr.io/dgtlmoon/changedetection.io:latest
changedetection_domain: track.atelier.house
changedetection_port: 5000

# Copyparty settings
copyparty_image: copyparty/ac
copyparty_domain: files.atelier.house
copyparty_port: 3923

# feederhub — local-first PetLibro PLAF203 control plane.
# Built from /Users/justin/Developer/PetLibro/feederhub; see that
# repo's deploy/README.md for the image build + push workflow.
#
# Host networking is intentional (not the proxy/backend bridges the
# rest of utilities use): WebRTC ICE candidates need to advertise a
# LAN-reachable address, and the bundled go2rtc binds UDP on every
# interface it can see.  MQTT points at 127.0.0.1:1883 — the host
# port `petlibro-mosquitto` publishes — so there's no need to share
# a Compose network with it either.  Traefik routes via the file
# provider (services-mini.yml) since the docker provider can't see
# host-networked containers.
feederhub_image: ghcr.io/jedmund/feederhub
feederhub_image_tag: phase4-cameras
feederhub_domain: cat.atelier.house
feederhub_host_port: 18080
# Distroless `nonroot` is uid 65532; the data dir must be writable
# by that uid for the SQLite DB to land.
feederhub_data_uid: 65532
feederhub_data_gid: 65532

# Server IPs (sourced from inventory so the value lives in one place).
# Vane needs max's address for SearXNG.
max_server_ip: "{{ hostvars['max'].ansible_host }}"

# Vane (https://github.com/ItzCrazyKns/Vane, jedmund/Vane fork with OIDC)
# Self-hosted Perplexity-style AI answering engine. Lives in the utilities
# stack because it is a search/research tool, not a developer tool.
#
# Built in place from the jedmund/Vane fork: ansible clones the repo to
# /opt/docker/utilities/vane-src and docker compose builds the image.
# Fork adds PocketID OIDC and full multi-user data scoping; see umbrella
# PR jedmund/Vane#5.
vane_repo_url: https://github.com/jedmund/Vane.git
vane_repo_version: master
vane_domain: vane.atelier.house
vane_port: 3000
# Reuse max's SearXNG so the bundled instance in Vane's image becomes
# dead weight. Same instance Odysseus and OpenWebUI use.
vane_searxng_url: "http://{{ max_server_ip }}:{{ vane_searxng_port }}"
vane_searxng_port: 8889

# OIDC env (PocketID). client_id, client_secret, and session_secret come
# from vault; empty defaults let templating succeed before the vault is
# populated, but the OIDC flow will fail loud with 503 oidc_unavailable
# until they are set.
#
# Required vault entries (add via `make edit-vault`):
#   vault_vane_oidc_client_id
#   vault_vane_oidc_client_secret
#   vault_vane_session_secret  (32+ chars; signs the state cookie HMAC)
vane_oidc_issuer_url: "https://id.atelier.house"
vane_oidc_scopes: "openid email profile"
vane_oidc_redirect_uri: "https://{{ vane_domain }}/api/auth/callback"
vane_oidc_client_id: "{{ vault_vane_oidc_client_id | default('') }}"
vane_oidc_client_secret: "{{ vault_vane_oidc_client_secret | default('') }}"
vane_session_secret: "{{ vault_vane_session_secret | default('') }}"
# Default 7-day session TTL. Tunable per deploy; proxy.ts slides the
# server-side expiry on every authenticated request and the cookie is
# re-emitted with a fresh Max-Age so the browser tracks server state.
vane_session_ttl_seconds: "604800"
