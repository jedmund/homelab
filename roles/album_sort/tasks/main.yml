---
# Album Sort - in-house SvelteKit app, built from source on the host

- name: Create {{ stack_name }} directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: '0755'
  loop:
    - "{{ docker_base_path }}/{{ stack_name }}"
    - "{{ docker_base_path }}/{{ stack_name }}/env"
    - "{{ docker_base_path }}/{{ stack_name }}/data"

- name: Pull latest {{ stack_name }} source
  git:
    repo: "{{ album_sort_repo }}"
    dest: "{{ album_sort_source_path }}"
    version: "{{ album_sort_version | default('main') }}"
    force: true
  notify: Restart {{ stack_name }} stack

- name: Deploy compose file
  template:
    src: compose.yaml.j2
    dest: "{{ docker_base_path }}/{{ stack_name }}/compose.yaml"
    owner: "{{ ansible_user }}"
    mode: '0644'
  notify: Restart {{ stack_name }} stack

- name: Deploy environment file
  template:
    src: env/album-sort.env.j2
    dest: "{{ docker_base_path }}/{{ stack_name }}/env/album-sort.env"
    owner: "{{ ansible_user }}"
    mode: '0600'
  no_log: true
  notify: Restart {{ stack_name }} stack

- name: Deploy {{ stack_name }} stack
  community.docker.docker_compose_v2:
    project_src: "{{ docker_base_path }}/{{ stack_name }}"
    state: present
    build: always
    pull: "{{ docker_pull_policy | default('missing') }}"
  register: compose_result
