---
# Beszel agent runs on every monitored host. Linux Docker hosts use a small
# compose project; macOS uses the Homebrew agent service.
beszel_agent_stack_name: beszel-agent
beszel_agent_config_base: "{{ docker_base_path | default('/opt/docker') }}/{{ beszel_agent_stack_name }}"

beszel_agent_hub_url: https://beszel.atelier.house
beszel_agent_key: ""
beszel_agent_token: "{{ vault_beszel_agent_token | default('') }}"
beszel_agent_system_name: "{{ inventory_hostname }}"
beszel_agent_listen: "45876"
beszel_agent_disable_ssh: "true"
beszel_agent_log_level: info

beszel_agent_base_image: henrygd/beszel-agent:latest
beszel_agent_nvidia_image: henrygd/beszel-agent-nvidia:latest
beszel_agent_intel_image: henrygd/beszel-agent-intel:latest
beszel_agent_image: >-
  {{
    beszel_agent_nvidia_image if gpu_type | default('') == 'nvidia'
    else beszel_agent_intel_image if gpu_type | default('') == 'intel_arc'
    else beszel_agent_base_image
  }}

beszel_agent_gpu_collector: >-
  {{
    'nvml' if gpu_type | default('') == 'nvidia'
    else 'intel_gpu_top' if gpu_type | default('') == 'intel_arc'
    else 'macmon' if gpu_type | default('') == 'apple_silicon'
    else ''
  }}
beszel_agent_intel_gpu_device: drm:/dev/dri/card0
beszel_agent_install_macmon: "{{ gpu_type | default('') == 'apple_silicon' }}"

# Docker agent can monitor additional filesystems by bind-mounting a marker
# directory from each filesystem into /extra-filesystems.
# Example:
# beszel_agent_extra_filesystems:
#   - source: /mnt/media/.beszel
#     name: media
beszel_agent_extra_filesystems: []

beszel_agent_credentials_configured: >-
  {{
    beszel_agent_token | string | length > 0
  }}
