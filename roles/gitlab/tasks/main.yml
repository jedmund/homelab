---
# GitLab product stack: GitLab, Docker runner, and Renovate.

- name: Create {{ stack_name }} directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: '0755'
  loop:
    - "{{ docker_base_path }}/{{ stack_name }}"
    - "{{ docker_base_path }}/{{ stack_name }}/env"
    - "{{ docker_base_path }}/{{ stack_name }}/config"
    - "{{ docker_base_path }}/{{ stack_name }}/logs"
    - "{{ docker_base_path }}/{{ stack_name }}/data"
    - "{{ docker_base_path }}/{{ stack_name }}/runner"
    - "{{ docker_base_path }}/{{ stack_name }}/runner/config"
    - "{{ docker_base_path }}/{{ stack_name }}/renovate"

- name: Deploy compose file
  ansible.builtin.template:
    src: compose.yaml.j2
    dest: "{{ docker_base_path }}/{{ stack_name }}/compose.yaml"
    owner: "{{ ansible_user }}"
    mode: '0644'
  notify: Restart {{ stack_name }} stack

- name: Deploy environment files
  ansible.builtin.template:
    src: "env/{{ item }}.env.j2"
    dest: "{{ docker_base_path }}/{{ stack_name }}/env/{{ item }}.env"
    owner: "{{ ansible_user }}"
    mode: '0600'
  loop:
    - gitlab
    - renovate
  no_log: true
  notify: Restart {{ stack_name }} stack

- name: Deploy GitLab omnibus config
  ansible.builtin.template:
    src: gitlab/gitlab.rb.j2
    dest: "{{ docker_base_path }}/{{ stack_name }}/config/gitlab.rb"
    owner: "{{ ansible_user }}"
    mode: '0600'
  no_log: true
  notify: Reconfigure GitLab if running

- name: Deploy GitLab Runner config
  ansible.builtin.template:
    src: gitlab-runner/config.toml.j2
    dest: "{{ docker_base_path }}/{{ stack_name }}/runner/config/config.toml"
    owner: "{{ ansible_user }}"
    mode: '0600'
  no_log: true
  notify: Restart {{ stack_name }} stack

- name: Deploy Renovate config
  ansible.builtin.template:
    src: renovate/config.js.j2
    dest: "{{ docker_base_path }}/{{ stack_name }}/renovate/config.js"
    owner: "{{ ansible_user }}"
    mode: '0644'

- name: Schedule GitLab application-consistent backup
  ansible.builtin.cron:
    name: gitlab-backup
    user: "{{ ansible_user }}"
    job: "docker exec gitlab gitlab-backup create SKIP={{ gitlab_backup_skip }} CRON=1 >> /var/log/gitlab-backup.log 2>&1"
    minute: "{{ gitlab_backup_cron.split(' ')[0] }}"
    hour: "{{ gitlab_backup_cron.split(' ')[1] }}"
    day: "{{ gitlab_backup_cron.split(' ')[2] }}"
    month: "{{ gitlab_backup_cron.split(' ')[3] }}"
    weekday: "{{ gitlab_backup_cron.split(' ')[4] }}"

- name: Schedule Renovate weekly run
  ansible.builtin.cron:
    name: renovate
    user: "{{ ansible_user }}"
    job: "docker compose -f {{ docker_base_path }}/{{ stack_name }}/compose.yaml run --rm renovate >> /var/log/renovate.log 2>&1"
    minute: "{{ renovate_schedule_cron.split(' ')[0] }}"
    hour: "{{ renovate_schedule_cron.split(' ')[1] }}"
    day: "{{ renovate_schedule_cron.split(' ')[2] }}"
    month: "{{ renovate_schedule_cron.split(' ')[3] }}"
    weekday: "{{ renovate_schedule_cron.split(' ')[4] }}"

- name: Deploy {{ stack_name }} stack
  community.docker.docker_compose_v2:
    project_src: "{{ docker_base_path }}/{{ stack_name }}"
    state: present
    remove_orphans: true
    pull: "{{ docker_pull_policy | default('missing') }}"
  register: compose_result
