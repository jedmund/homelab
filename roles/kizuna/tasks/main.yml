---
# Kizuna stack — SvelteKit SPA (kizuna-app) + Rails API (kizuna-api)
# + Sidekiq worker + Postgres + Redis + Garage S3.  Images are built
# in GitLab CI and pulled here; this role does not build from source.
#
# Bootstrap ordering (one-time, manual):
#   1. Populate vault entries — see roles/kizuna/defaults/main.yml.
#   2. First `make deploy-kizuna` brings up the stack.  Garage starts
#      with no cluster layout, no key, no bucket — the SPA can boot
#      but media uploads fail until step 3.
#   3. SSH to the host and run `roles/kizuna/files/garage_bootstrap.sh`
#      to assign a cluster layout, create the Kizuna bucket, and
#      either import the vault-supplied access key or print one to
#      add to the vault.  Idempotent; re-run after any vault edit.
#   4. Register a Komodo Stack resource named `kizuna` (the value of
#      KOMODO_KIZUNA_STACK in CI) pointing at /opt/docker/kizuna with
#      files_on_host=true so CI-triggered redeploys land on the same
#      compose Ansible just rendered.

- name: Create {{ stack_name }} directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: '0755'
  loop:
    - "{{ config_base }}"
    - "{{ config_base }}/env"
    - "{{ config_base }}/config/garage"

- name: Deploy Garage config
  template:
    src: garage.toml.j2
    dest: "{{ config_base }}/config/garage/garage.toml"
    owner: "{{ ansible_user }}"
    mode: '0600'
  no_log: true
  notify: Restart {{ stack_name }} stack

- name: Deploy compose file
  template:
    src: compose.yaml.j2
    dest: "{{ config_base }}/compose.yaml"
    owner: "{{ ansible_user }}"
    mode: '0644'
  notify: Restart {{ stack_name }} stack

- name: Deploy environment files
  template:
    src: "env/{{ item }}.env.j2"
    dest: "{{ config_base }}/env/{{ item }}.env"
    owner: "{{ ansible_user }}"
    mode: '0600'
  loop:
    - api
    - postgres
    - garage
    - screenshotter
  no_log: true
  notify: Restart {{ stack_name }} stack

- name: Stage Garage bootstrap script
  copy:
    src: garage_bootstrap.sh
    dest: "{{ config_base }}/garage_bootstrap.sh"
    owner: "{{ ansible_user }}"
    mode: '0750'

- name: Authenticate with Kizuna image registry
  community.docker.docker_login:
    registry_url: "{{ kizuna_registry_url }}"
    username: "{{ kizuna_registry_username }}"
    password: "{{ kizuna_registry_password }}"
    reauthorize: true
  when: kizuna_registry_username | length > 0 and kizuna_registry_password | length > 0
  no_log: true

- name: Deploy {{ stack_name }} stack
  community.docker.docker_compose_v2:
    project_src: "{{ config_base }}"
    state: present
    remove_orphans: true
    pull: "{{ docker_pull_policy | default('missing') }}"
  register: compose_result

# The one-time garage_bootstrap.sh handles layout + bucket + key creation
# (the key secret has to be captured into the vault by a human). But its two
# idempotent, declarative steps — granting the key access and setting CORS —
# are wired here so every deploy self-heals them. This is what was missing in
# prod: the key existed with NO bucket permission (so the app couldn't store
# media) and CORS was unset (so browser presigned-PUT uploads would fail).
# Both `allow` and `set-cors` are no-ops once applied. Gated on the vault key
# being present and the bucket existing, so a pre-bootstrap host skips cleanly.
- name: Ensure Garage bucket access + CORS
  when: kizuna_garage_access_key_id | length > 0
  block:
    - name: Check the Garage bucket exists
      command: docker exec kizuna-garage /garage bucket info {{ kizuna_garage_bucket }}
      register: kizuna_garage_bucket_info
      changed_when: false
      failed_when: false

    - name: Grant the API key read+write+owner on the bucket
      command: >-
        docker exec kizuna-garage /garage bucket allow
        --read --write --owner {{ kizuna_garage_bucket }}
        --key {{ kizuna_garage_access_key_id }}
      changed_when: false
      when: kizuna_garage_bucket_info.rc == 0

    # Garage v2.3.0's CLI has no `bucket set-cors`; CORS is an S3-API config
    # (PutBucketCors). Set it through the API's own aws-sdk client (already in
    # the image) so the SPA's cross-origin presigned PUT uploads are allowed.
    # argv form avoids shell/shlex quoting of the inline script. Idempotent.
    - name: Allow the SPA origin to upload via CORS (S3 PutBucketCors)
      command:
        argv:
          - docker
          - exec
          - kizuna-api
          - bin/rails
          - runner
          - |
            require "aws-sdk-s3"
            client = Aws::S3::Client.new(
              endpoint: ENV.fetch("KIZUNA_S3_ENDPOINT"),
              region: ENV.fetch("KIZUNA_S3_REGION", "garage"),
              access_key_id: ENV.fetch("KIZUNA_S3_ACCESS_KEY_ID"),
              secret_access_key: ENV.fetch("KIZUNA_S3_SECRET_ACCESS_KEY"),
              force_path_style: true
            )
            client.put_bucket_cors(
              bucket: ENV.fetch("KIZUNA_S3_BUCKET"),
              cors_configuration: {cors_rules: [{
                allowed_origins: ["{{ kizuna_web_origin }}"],
                allowed_methods: %w[GET PUT POST DELETE],
                allowed_headers: ["*"],
                expose_headers: ["ETag"]
              }]}
            )
      changed_when: false
      when: kizuna_garage_bucket_info.rc == 0

- name: Print post-deploy reminder
  debug:
    msg: |
      {{ stack_name }} stack deployed.

      If this is the first deploy:
        1. ssh into the host and run:
             cd {{ config_base }} && ./garage_bootstrap.sh
           Re-run any time vault Garage credentials change.
        2. Register a Komodo Stack named "kizuna" (files_on_host=true,
           project_src={{ config_base }}) so CI-triggered redeploys
           target the same compose.
        3. Set CI variables in BOTH GitLab projects (kizuna-api and
           kizuna-app):
             KOMODO_URL, KOMODO_API_KEY, KOMODO_API_SECRET,
             KOMODO_KIZUNA_STACK=kizuna
        4. kizuna-app additionally needs:
             FONTAWESOME_NPM_AUTH_TOKEN
             PUBLIC_KIZUNA_API_URL={{ kizuna_api_origin }}
