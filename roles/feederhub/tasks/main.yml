---
# Feederhub stack — local-first PetLibro PLAF203 control plane.  Image
# is built by GitLab CI in jedmund/feederhub and pulled here; this role
# does not build from source.
#
# Bootstrap ordering (one-time, manual):
#   1. Populate vault entries — see roles/feederhub/defaults/main.yml.
#   2. First `make deploy-feederhub` brings up the stack.
#   3. Register a Komodo Stack resource named `feederhub` (the value
#      of KOMODO_FEEDERHUB_STACK in CI) pointing at /opt/docker/feederhub
#      with files_on_host=true so CI-triggered redeploys land on the
#      same compose Ansible just rendered.
#   4. Set CI variables in the jedmund/feederhub GitLab project:
#        KOMODO_URL, KOMODO_API_KEY, KOMODO_API_SECRET,
#        KOMODO_FEEDERHUB_STACK=feederhub

# ---- ONVIF LAN VIPs on macvlan children ---------------------------
# Each feeder is exposed as an independent ONVIF camera at its own LAN
# VIP.  The VIPs MUST sit on macvlan child interfaces of br0 (each
# with its own MAC) rather than as alias IPs on br0 itself — UniFi
# Protect dedupes adopted cameras on the link-layer MAC obtained via
# ARP, and alias IPs all ARP back with the bridge's real MAC, so a
# second adoption silently replaces the first.

- name: Remove legacy alias-IP systemd-networkd drop-in (superseded by macvlan)
  ansible.builtin.file:
    path: /etc/systemd/network/50-feederhub-onvif-vips.network
    state: absent
  notify: Reload systemd-networkd

- name: Remove legacy alias IPs from {{ feederhub_onvif_bridge }} if present
  ansible.builtin.command:
    cmd: "ip address del {{ item.ip }}/24 dev {{ feederhub_onvif_bridge }}"
  loop: "{{ feederhub_onvif_devices }}"
  loop_control:
    label: "{{ item.ip }}"
  register: vip_legacy_del
  changed_when: vip_legacy_del.rc == 0
  # Tolerate the two flavours of "nothing to delete" iproute2
  # returns depending on distro / kernel version:
  #   * "Cannot assign requested address" — address isn't on the iface
  #   * "Address not found" — same condition, different wording
  failed_when:
    - vip_legacy_del.rc != 0
    - "'Cannot assign requested address' not in vip_legacy_del.stderr"
    - "'Address not found' not in vip_legacy_del.stderr"
  when: feederhub_onvif_enabled | bool

- name: Install feederhub-onvif-vips systemd unit
  ansible.builtin.template:
    src: systemd/feederhub-onvif-vips.service.j2
    dest: /etc/systemd/system/feederhub-onvif-vips.service
    owner: root
    group: root
    mode: '0644'
  when: feederhub_onvif_enabled | bool
  register: vip_unit

- name: Reload systemd to pick up feederhub-onvif-vips.service
  ansible.builtin.systemd:
    daemon_reload: true
  when: vip_unit.changed

- name: Enable + start feederhub-onvif-vips
  ansible.builtin.systemd:
    name: feederhub-onvif-vips.service
    enabled: true
    state: restarted
  when: feederhub_onvif_enabled | bool

# Lower the host's "privileged port" cutoff so feederhub's distroless
# nonroot process can bind port 80 on its VIPs.  `cap_add` in compose
# alone isn't sufficient — it adds to the container's permitted set
# but not the ambient set, so the uid-65532 process still gets EACCES
# on bind(0.0.0.0:80).  Setting ip_unprivileged_port_start=80
# eliminates the privilege check for any port >= 80, which is what we
# want here.  Host-wide change, but the only ports < 1024 that anyone
# on the nuc binds are 80 (traefik), 443 (traefik), 22 (sshd) — all
# already run with root.
- name: Lower privileged-port cutoff so nonroot can bind :80
  ansible.posix.sysctl:
    name: net.ipv4.ip_unprivileged_port_start
    value: '80'
    state: present
    sysctl_set: true
    reload: true
    sysctl_file: /etc/sysctl.d/50-feederhub-unprivileged-ports.conf
  when: feederhub_onvif_enabled | bool

- name: Create {{ stack_name }} directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: '0755'
  loop:
    - "{{ config_base }}"
    - "{{ config_base }}/env"

# Feederhub's distroless image runs as uid 65532; the data dir must be
# owned by that uid for the SQLite DB to land.
- name: Create feederhub data directory
  file:
    path: "{{ config_base }}/config/feederhub"
    state: directory
    owner: "{{ feederhub_data_uid }}"
    group: "{{ feederhub_data_gid }}"
    mode: '0750'

- name: Deploy compose file
  template:
    src: compose.yaml.j2
    dest: "{{ config_base }}/compose.yaml"
    owner: "{{ ansible_user }}"
    mode: '0644'
  notify: Restart {{ stack_name }} stack

- name: Deploy environment file
  template:
    src: env/feederhub.env.j2
    dest: "{{ config_base }}/env/feederhub.env"
    owner: "{{ ansible_user }}"
    mode: '0600'
  no_log: true
  notify: Restart {{ stack_name }} stack

- name: Authenticate with feederhub image registry
  community.docker.docker_login:
    registry_url: "{{ feederhub_registry_url }}"
    username: "{{ feederhub_registry_username }}"
    password: "{{ feederhub_registry_password }}"
    reauthorize: true
  when: feederhub_registry_username | length > 0 and feederhub_registry_password | length > 0
  no_log: true

- name: Deploy {{ stack_name }} stack
  community.docker.docker_compose_v2:
    project_src: "{{ config_base }}"
    state: present
    remove_orphans: true
    pull: "{{ docker_pull_policy | default('missing') }}"
  register: compose_result
