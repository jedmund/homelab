---
# Stack identity
stack_name: media-acquisition
config_base: "{{ docker_base_path }}/{{ stack_name }}"

# Qui settings
qui_domain: dl.atelier.house
qui_port: 7476
qui_oidc_enabled: "true"
qui_oidc_issuer: "https://id.atelier.house"
qui_oidc_redirect_url: "https://{{ qui_domain }}/api/auth/oidc/callback"
qui_oidc_disable_built_in_login: "true"

# JDownloader settings
jdownloader_domain: jdl.atelier.house
jdownloader_port: 5800

# slskdN (Soulseek) settings
slskd_domain: sl.atelier.house
slskd_web_port: 5030
slskd_listen_port: 50300

# Album Sort (in-house app, built from source)
album_sort_repo: ssh://git@git.atelier.house:2222/jedmund/album-sort.git
album_sort_version: main
album_sort_source_path: /home/justin/album-sort
album_sort_port: 5180
album_sort_container_port: 3000
album_sort_domain: sorter.atelier.house
album_sort_origin: "https://{{ album_sort_domain }}"
album_sort_unsorted_path: /music/Sort
album_sort_sorted_path: /music/Sorted
album_sort_data_path: /data
album_sort_watch_interval: "30000"
# Secrets defined in vault:
# album_sort_apple_music_team_id, album_sort_apple_music_key_id,
# album_sort_apple_music_private_key, album_sort_discogs_token,
# album_sort_kagi_api_key, album_sort_lastfm_api_key, album_sort_lastfm_api_secret
