---
# Strudel product stack

- name: Create {{ stack_name }} directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: '0755'
  loop:
    - "{{ docker_base_path }}/{{ stack_name }}"
    - "{{ docker_base_path }}/{{ stack_name }}/config/strudel"

- name: Deploy Strudel Dockerfile
  ansible.builtin.copy:
    src: strudel/Dockerfile
    dest: "{{ docker_base_path }}/{{ stack_name }}/config/strudel/Dockerfile"
    owner: "{{ ansible_user }}"
    mode: '0644'
  notify: Restart {{ stack_name }} stack

- name: Deploy compose file
  ansible.builtin.template:
    src: compose.yaml.j2
    dest: "{{ docker_base_path }}/{{ stack_name }}/compose.yaml"
    owner: "{{ ansible_user }}"
    mode: '0644'
  notify: Restart {{ stack_name }} stack

- name: Deploy {{ stack_name }} stack
  community.docker.docker_compose_v2:
    project_src: "{{ docker_base_path }}/{{ stack_name }}"
    state: present
    remove_orphans: true
    build: always
    # Strudel uses a local-only image tag. Keep pull: policy so docker
    # compose honors the service's pull_policy: build instead of trying
    # to pull strudel:local when global docker_pull_policy is always.
    pull: policy
  register: compose_result
