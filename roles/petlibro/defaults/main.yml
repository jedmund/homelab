---
# Stack identity
stack_name: petlibro
config_base: "{{ docker_base_path }}/{{ stack_name }}"

# ---------------------------------------------------------------------------
# catbro-server (mock Petlibro cloud + embedded go2rtc) — github bobobo1618
#
# Disabled by default since feederhub (roles/utilities) now handles the live
# MQTT bridge + video plane.  Catbro's only remaining purpose is protocol
# research — flip this to true for capture sessions, then back to false so it
# stops fighting feederhub for :8554 (RTSP) and :1984/8555.
#
# When enabled the repo gets cloned into <config_base>/src on the NUC and a
# multi-stage Dockerfile builds it into a single binary container image.  Pin
# to a git ref so capture sessions are reproducible; bump it deliberately.
# ---------------------------------------------------------------------------
petlibro_catbro_enabled: false
catbro_repo_url: "https://github.com/bobobo1618/catbro-server.git"
# Upstream's default branch (vibe-coded, no tagged releases as of writing).
# Pin to a specific commit SHA when something works so future deploys don't drift.
catbro_repo_ref: "master"
catbro_image_tag: "local/catbro-server:latest"

# ---------------------------------------------------------------------------
# Mosquitto MQTT broker (anonymous, local-only)
# Feeders connect here after the DNS rewrite. HA on NUC8 also connects here.
# ---------------------------------------------------------------------------
mosquitto_image: eclipse-mosquitto:2

# Host port mappings (LAN-exposed; no auth — protect via firewall + VLAN scope)
petlibro_mqtt_host_port: 1883
petlibro_go2rtc_api_host_port: 1984     # WebUI/HTTP API
petlibro_go2rtc_rtsp_host_port: 8554    # RTSP for HA camera entities
petlibro_go2rtc_webrtc_host_port: 8555  # WebRTC (TCP)

# ---------------------------------------------------------------------------
# catbro-server runtime config
# ---------------------------------------------------------------------------
# Topic prefix that feeders use. Don't change unless Petlibro firmware does.
petlibro_topic_prefix: "dl/PLAF203"
# Bridge mode = act as the Petlibro cloud
petlibro_mode: "bridge"
# HA MQTT autodiscovery prefix (must match HA's "discovery_prefix")
petlibro_ha_discovery_prefix: "homeassistant"
# IANA timezone — controls the offset catbro reports to feeders for scheduling
petlibro_timezone: "America/Los_Angeles"

# Subnets where feeders live (for TUTK UID discovery via go2rtc petlibro://)
petlibro_subnets:
  - "192.168.20.0/24"

# Per-feeder configuration. Each entry produces:
#   - one creds.toml block (binds device_sn -> tutk_uid)
#   - one go2rtc stream named "petlibro_<friendly_name>" -> petlibro://<uid>
#   - one Home Assistant camera entity (auto-discovered via MQTT)
#   - one --seed-feeder arg on the kalay_mock systemd unit (LAN IP needed
#     so the mock can answer "where is UID X?" without waiting for the
#     feeder's first KEEPALIVE)
petlibro_feeders:
  - device_sn: "AF03013D11C574RN1"
    tutk_uid: "JNGT5PBUAF61NKVS111A"
    friendly_name: "left_feeder"
    local_ip: "192.168.1.180"
  - device_sn: "AF0301374F9901C5B"
    tutk_uid: "HFEY837GWWHWC27U111A"
    friendly_name: "right_feeder"
    local_ip: "192.168.1.181"

# ---------------------------------------------------------------------------
# kalay_mock — Python re-implementation of the Kalay master server.  Pretends
# to be the TUTK cloud so feeders can register without internet, and any
# Kalay client (feederhub, catbro's go2rtc, ...) can ask "where is UID X?"
# and get back the feeder's LAN endpoint.  Runs as a host-level systemd unit,
# NOT a container — the scripts pre-date the containerised stack and there's
# no upside to wrapping them.
#
# Without this running, feederhub's FEEDERHUB_TUTK_SERVER target on
# 192.168.1.6:10001 is unbound and every WebRTC offer fails with
# `streams: petlibro/tutk: dial: read udp ...: i/o timeout`.
# ---------------------------------------------------------------------------
kalay_mock_dir: "/opt/kalay-mock"
kalay_mock_user: "{{ ansible_user }}"
kalay_mock_group: "{{ ansible_user }}"
# Port plan matches what's currently deployed on the NUC.  The mock listens
# on multiple UDP ports because the real TUTK cloud uses both 10001 and
# 10240; feeders are observed to talk to whichever they were provisioned
# against.  TCP 10080 is required for AV streaming (Kalay-over-TCP).
kalay_mock_udp_ports:
  - 10001
  - 10240
kalay_mock_tcp_port: 10080
# Verbosity passed to the script.  -vv = DEBUG.  Drop to -v in steady state
# once we trust the unit; right now we want full session traces.
kalay_mock_verbosity: "-vv"
