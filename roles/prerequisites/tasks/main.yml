---
# Ensure host has working DNS (fixes systemd-resolved issues with AdGuard)
# This runs first to ensure we can download packages and keys
- name: Check if DNS resolution is working
  shell: getent hosts registry-1.docker.io
  register: dns_check
  failed_when: false
  changed_when: false
  timeout: 5

- name: Configure external DNS if resolution is broken
  copy:
    content: |
      # Managed by Ansible - external DNS fallback
      nameserver 1.1.1.1
      nameserver 1.0.0.1
    dest: /etc/resolv.conf
    owner: root
    group: root
    mode: '0644'
  when: dns_check.rc != 0

- name: Configure passwordless sudo for ansible user
  copy:
    content: "{{ ansible_user }} ALL=(ALL) NOPASSWD: ALL"
    dest: "/etc/sudoers.d/{{ ansible_user }}"
    mode: "0440"
    validate: "visudo -cf %s"

# Shell environment setup
- name: Install apt packages
  apt:
    name:
      - zsh
      - sqlite3
    state: present
    update_cache: yes

- name: Ensure keyrings directory exists
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Add eza GPG key
  apt_key:
    url: https://raw.githubusercontent.com/eza-community/eza/main/deb.asc
    keyring: /etc/apt/keyrings/gierens.gpg
    state: present

- name: Add eza repository
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/gierens.gpg] http://deb.gierens.de stable main"
    state: present
    filename: gierens

- name: Install eza
  apt:
    name: eza
    state: present
    update_cache: yes

- name: Check if oh-my-zsh is installed
  stat:
    path: "/home/{{ ansible_user }}/.oh-my-zsh"
  register: ohmyzsh_installed

- name: Install oh-my-zsh
  become_user: "{{ ansible_user }}"
  shell: |
    sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended
  args:
    creates: "/home/{{ ansible_user }}/.oh-my-zsh"
  when: not ohmyzsh_installed.stat.exists

- name: Set zsh as default shell
  user:
    name: "{{ ansible_user }}"
    shell: /bin/zsh

# GitHub CLI (gh)
- name: Add GitHub CLI GPG key
  apt_key:
    url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
    keyring: /etc/apt/keyrings/githubcli-archive-keyring.gpg
    state: present

- name: Add GitHub CLI repository
  apt_repository:
    repo: "deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }} signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main"
    state: present
    filename: github-cli

- name: Install GitHub CLI
  apt:
    name: gh
    state: present
    update_cache: yes

# GitLab CLI (glab)
- name: Add GitLab CLI GPG key
  apt_key:
    url: https://packages.gitlab.com/gitlab/cli/gpgkey
    keyring: /etc/apt/keyrings/gitlab-cli.gpg
    state: present

- name: Add GitLab CLI repository
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/gitlab-cli.gpg] https://packages.gitlab.com/gitlab/cli/ubuntu/ {{ ansible_distribution_release }} main"
    state: present
    filename: gitlab-cli

- name: Install GitLab CLI
  apt:
    name: glab
    state: present
    update_cache: yes

# HuggingFace CLI (hf) via pipx
- name: Install pipx
  apt:
    name: pipx
    state: present

- name: Install HuggingFace CLI via pipx
  become_user: "{{ ansible_user }}"
  command: pipx install "huggingface_hub[cli]"
  args:
    creates: "/home/{{ ansible_user }}/.local/bin/hf"

- name: Ensure pipx bin dir is on PATH
  become_user: "{{ ansible_user }}"
  command: pipx ensurepath
  register: pipx_ensurepath
  changed_when: "'added to' in pipx_ensurepath.stdout or 'Success' in pipx_ensurepath.stdout"
