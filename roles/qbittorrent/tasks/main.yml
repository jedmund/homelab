---
# qBittorrent product stack

- name: Create {{ stack_name }} directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: '0755'
  loop:
    - "{{ docker_base_path }}/{{ stack_name }}"
    - "{{ docker_base_path }}/{{ stack_name }}/config"

- name: Inspect existing {{ stack_name }} container
  community.docker.docker_container_info:
    name: qbittorrent
  register: qbittorrent_container_info
  failed_when: false
  changed_when: false

- name: Remove stale {{ stack_name }} lockfile when the app is stopped
  become: true
  ansible.builtin.file:
    path: "{{ config_base }}/config/qBittorrent/lockfile"
    state: absent
  when: >-
    not (
      qbittorrent_container_info.exists | default(false)
      and qbittorrent_container_info.container.State.Running | default(false)
      and qbittorrent_container_info.container.State.Health.Status | default('') != 'unhealthy'
    )
  notify: Restart {{ stack_name }} stack

- name: Deploy compose file
  ansible.builtin.template:
    src: compose.yaml.j2
    dest: "{{ docker_base_path }}/{{ stack_name }}/compose.yaml"
    owner: "{{ ansible_user }}"
    mode: '0644'
  notify: Restart {{ stack_name }} stack

- name: Deploy {{ stack_name }} stack
  community.docker.docker_compose_v2:
    project_src: "{{ docker_base_path }}/{{ stack_name }}"
    state: present
    remove_orphans: true
    pull: "{{ docker_pull_policy | default('missing') }}"
  register: compose_result
