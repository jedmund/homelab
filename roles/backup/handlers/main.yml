---
- name: Restart {{ stack_name }} stack
  community.docker.docker_compose_v2:
    project_src: "{{ docker_base_path }}/{{ stack_name }}"
    state: present
    remove_orphans: true
    build: always
    recreate: always

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart NAS automount
  ansible.builtin.systemd:
    name: "{{ nas_systemd_unit_basename }}.automount"
    state: restarted
    enabled: true
