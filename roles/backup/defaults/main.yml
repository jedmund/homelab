---
# Stack identity
stack_name: backup
config_base: "{{ docker_base_path }}/{{ stack_name }}"

# Borgmatic image (extended via Dockerfile to add rsync + nfs-common)
borgmatic_upstream_image: ghcr.io/borgmatic-collective/borgmatic:latest

# Borg repo (host-local on nuc-mini, mounted into container at /repo)
borg_repo_host_path: /var/backup/borg
borg_repo_container_path: /repo
borg_repo_label: nuc-mini

# Retention
borg_keep_daily: 30

# Schedule (container internal cron, container TZ matches host)
borg_backup_cron: "0 2 * * *"
borg_run_on_startup: "false"

# Encryption
borg_encryption_mode: repokey-blake2
# borg_passphrase - defined in vault

# Compression
borg_compression: zstd,3

# Source paths to back up (read-only mounted into container at same path)
borg_source_paths:
  - /opt/docker

# Patterns to exclude (relative to source paths)
# musicbrainz: reproducible from upstream MetaBrainz dumps per its README
# backup itself: avoid recursive snapshot of the borgmatic config dir
borg_exclude_patterns:
  - /opt/docker/musicbrainz
  - /opt/docker/backup

# Integrity checks
borg_check_repository_frequency: 1 week
borg_check_archives_frequency: 1 month

# Custom DB dumps (CouchDB + SQLite). Native Postgres/MariaDB/MongoDB dumps
# are streamed by borgmatic directly; these are written to disk first by
# scripts in before_backup hooks, then backed up by borgmatic as part of
# the source path below.
borg_dumps_host_path: /var/backup/dumps
borg_dumps_container_path: /dumps

# borg-ui (web frontend)
borg_ui_image: ainullcode/borg-ui:latest
borg_ui_domain: backup.atelier.house
borg_ui_container_port: 8081
# OIDC against PocketID is configured manually via the borg-ui Settings
# panel after first deploy (the image doesn't accept OIDC config via env
# vars). See README for the bootstrap procedure.

# Networks the borgmatic container needs to join so it can reach every DB
# by container hostname. All declared external because they're created by
# other stacks.
borg_networks:
  - backend-internal   # mastodon, synapse, mas, komodo, n8n, forgejo, blinko, draftboard, miniflux, romm
  - shared-network     # immich postgres
  - proxy-network      # couchdb (obsidian_livesync)

# DB credentials are consumed from each stack's existing vault values
# (loaded because nuc-mini is a member of every relevant host group):
#   immich_db_username, immich_db_password, immich_db_name
#   mastodon_db_user, mastodon_db_password, mastodon_db_name
#   synapse_db_user, synapse_db_password, synapse_db_name
#   mas_db_user, mas_db_password, mas_db_name
#   n8n_db_user, n8n_db_password, n8n_db_name
#   miniflux_db_user, miniflux_db_password, miniflux_db_name
#   forgejo_db_user, forgejo_db_password, forgejo_db_name
#   blinko_db_user, blinko_db_password, blinko_db_name
#   draftboard_db_user, draftboard_db_password, draftboard_db_name
#   komodo_db_username, komodo_db_password
#   romm_db_user, romm_db_password, romm_db_name, romm_db_root_password
#   couchdb_user, couchdb_password

# Monitoring (Healthchecks.io). Create a check with a 1-day-and-some grace
# period at https://healthchecks.io and put its ping URL in the vault.
# borg_healthchecks_url - defined in vault
borg_healthchecks_send_logs: true
borg_healthchecks_verify_tls: true
borg_healthchecks_states:
  - finish
  - fail

# NAS mount (rsync target)
nas_mount_host_path: /mnt/nas/backup
nas_mount_container_path: /nas
# Systemd unit basename derived from path: /mnt/nas/backup -> mnt-nas-backup
nas_systemd_unit_basename: mnt-nas-backup
nas_share_subpath: borg-nuc-mini   # subdirectory inside the share for this host's repo
nas_nfs_server: 192.168.1.3        # UniFi NAS
# UniFi Drive exports each Shared Drive at /volume/<storage-uuid>/.srv/.unifi-drive/<name>/.data.
# UUID is per-NAS-instance; rediscover with `showmount -e 192.168.1.3` if the NAS is ever rebuilt.
nas_nfs_export: /volume/3184c922-dd97-43b0-b873-8bcb99ac2668/.srv/.unifi-drive/Homelab/.data
nas_nfs_options: "rw,soft,timeo=30,retrans=2,noatime,_netdev,nofail"
