---
# Stack identity
stack_name: ai
config_base: "{{ docker_base_path }}/{{ stack_name }}"

# llama-swap settings
# https://github.com/mostlygeek/llama-swap
llama_swap_image: ghcr.io/mostlygeek/llama-swap:cuda
llama_swap_port: 11434
llama_swap_log_level: info
llama_swap_health_check_timeout: 60

# Model catalogue
# Models live in {{ config_base }}/models on the host and are mounted at
# /models inside the container. Files are downloaded out of band (see
# roles/ai/README.md). Each entry becomes a llama-swap model with a
# llama-server backend; aliases let OpenWebUI/Ollama clients reach them
# under familiar names.
ai_models:
  # Fast everyday driver — Qwen3.6 35B total / 3B active per token MoE.
  # ~240 tok/s on Blackwell. Multimodal. Using the non-MTP variant
  # because MTP barely moves MoE (~1.15x) — the dense models below get
  # the real MTP win, this one just keeps the simpler config and saves
  # ~1GB VRAM.
  - name: qwen3.6-flash
    file: Qwen3.6-35B-A3B-UD-Q4_K_XL.gguf
    args: >-
      -ngl 999 -c 32768 --flash-attn on
      --cache-type-k q8_0 --cache-type-v q8_0
      --temp 1.0 --top-p 0.95 --top-k 20 --min-p 0.0
      --jinja
    aliases:
      - "qwen3.6:35b-a3b"
      - "qwen3.6-fast"

  # Quality everyday driver — Qwen3.6 27B dense with multi-token
  # prediction. ~160 tok/s on Blackwell, multimodal, 256K context.
  # MTP flags require llama.cpp from 2026-05-16 or newer; `docker pull
  # ghcr.io/mostlygeek/llama-swap:cuda` before first deploy to ensure
  # the bundled llama-server is recent enough.
  - name: qwen3.6
    # Pulled from unsloth/Qwen3.6-27B-MTP-GGUF; unsloth doesn't put "MTP"
    # in the filename, only in the repo name (the file is still the MTP
    # build, which the --spec-type draft-mtp arg below relies on).
    file: Qwen3.6-27B-UD-Q4_K_XL.gguf
    args: >-
      -ngl 999 -c 32768 --flash-attn on
      --cache-type-k q8_0 --cache-type-v q8_0
      --spec-type draft-mtp --spec-draft-n-max 6
      --temp 1.0 --top-p 0.95 --top-k 20 --min-p 0.0
      --jinja
    aliases:
      - "qwen3.6:27b"

  # Different lineage from Qwen — Google's top-of-Arena open dense
  # model. Multimodal (text+image), 256K context. Sampling per Google's
  # recommended values; no MTP variant available upstream.
  - name: gemma4
    file: gemma-4-31B-it-UD-Q4_K_XL.gguf
    args: >-
      -ngl 999 -c 32768 --flash-attn on
      --cache-type-k q8_0 --cache-type-v q8_0
      --temp 1.0 --top-p 0.95 --top-k 64
      --jinja
    aliases:
      - "gemma4:31b"

  - name: qwen3-coder
    file: Qwen3-Coder-30B-A3B-Instruct-Q6_K.gguf
    args: "-ngl 99 -c 16384"
    aliases:
      - "qwen3-coder:30b"

  # OpenAI's open-weight 120B MoE (~5.1B active per token). At Unsloth's
  # UD-Q4_K_XL it lands ~65-70GB on disk, leaving headroom for KV cache on
  # the 96GB Blackwell. Replaces the gpt-oss-20b entry that sized for the
  # previous 2x 3090 setup. Split GGUF (shard 1 here, llama-server auto-
  # loads the rest); verify the shard count after download and adjust.
  - name: gpt-oss
    file: gpt-oss-120b-UD-Q4_K_XL-00001-of-00002.gguf
    args: >-
      -ngl 999 -c 32768 --flash-attn on
      --cache-type-k q8_0 --cache-type-v q8_0
      --jinja
    aliases:
      - "gpt-oss:120b"

  # 229B / 10B-active MoE; needs flash-attn + KV quantisation to fit 96GB.
  # Sampling pinned to the values MiniMax recommends; --jinja is required
  # for the chat template + tool-call handling to work correctly.
  - name: minimax-m27
    # Split GGUF: 3 shards (~78GB total). Point llama-server at shard 1;
    # it auto-loads the rest from the same directory.
    file: MiniMax-M2.7-UD-IQ3_S-00001-of-00003.gguf
    args: >-
      -ngl 999 -c 65536 --flash-attn on
      --cache-type-k q8_0 --cache-type-v q8_0
      --temp 1.0 --top-p 0.95 --top-k 40
      --jinja
    aliases:
      - "minimax:m27"

  # nomic-embed lived here under llama-swap; embeddings are now served
  # by the dedicated TEI container at :11435 (see tei_* below). Reranker
  # stays in llama-swap because reranker volume is low and TEI would be
  # one more service for marginal gain.
  - name: bge-reranker
    file: bge-reranker-v2-m3-Q8_0.gguf
    args: "-ngl 99 --reranking"
    ttl: 300
    aliases:
      - "bge-reranker-v2-m3"

# Default TTL (seconds of idle before llama-swap unloads a model).
# Individual ai_models entries can override via their own `ttl:` key.
ai_model_default_ttl: 600

# Whisper STT (speaches, formerly faster-whisper-server)
# https://github.com/speaches-ai/speaches
# OpenAI-compatible: POST /v1/audio/transcriptions
whisper_image: ghcr.io/speaches-ai/speaches:latest-cuda
whisper_port: 9000
# Default model downloaded on first use. distil-large-v3 is the fastest
# high-quality option; bump to faster-whisper-large-v3 for max accuracy.
whisper_default_model: Systran/faster-distil-whisper-large-v3

# Kokoro TTS (kokoro-fastapi)
# https://github.com/remsky/Kokoro-FastAPI
# OpenAI-compatible: POST /v1/audio/speech
#
# Pinned to the CPU image because Kokoro is small (~80M params) and the
# -gpu image bundles a PyTorch built for sm_50..sm_90, which can't run
# on the RTX PRO 6000 Blackwell (sm_120). Switch back to -gpu when
# upstream ships a PyTorch 2.7+/CUDA 12.8 image with Blackwell kernels.
kokoro_image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
kokoro_port: 8880
# af_sky | af_bella | af_nicole | am_adam | am_michael | bf_emma | bf_isabella
kokoro_default_voice: af_sky

# SearXNG (metasearch, fronts web search for OpenWebUI's RAG)
# https://github.com/searxng/searxng
searxng_image: docker.io/searxng/searxng:latest
searxng_port: 8889
searxng_base_url: "http://{{ ansible_host }}:{{ searxng_port }}/"
# Lives in vault as `searxng_secret_key`; empty default lets the first
# render succeed but SearXNG will refuse to start until populated.
searxng_secret_key: ""

# Text Embeddings Inference (TEI) from HuggingFace
# https://github.com/huggingface/text-embeddings-inference
# OpenAI-compatible: POST /v1/embeddings
# Single-model server (one container per model). Cached under a named
# volume so the model only downloads once.
tei_image: ghcr.io/huggingface/text-embeddings-inference:cuda-latest
tei_port: 11435
# Pinned to the same model that the (now-retired) nomic-embed entry in
# llama-swap served, so OpenWebUI and any other consumer can swap in
# place without re-embedding. Swap for BAAI/bge-large-en-v1.5 or
# Qwen/Qwen3-Embedding-8B if you want top-of-MTEB at higher cost.
tei_model_id: nomic-ai/nomic-embed-text-v1.5
# Pinned revision: the 2026-04-07 "v5 Transformers (#57)" commit on main
# adds an `n_positions` field whose serde alias collides with the existing
# `max_position_embeddings`, so TEI rejects the config as a duplicate
# field. This commit is the one immediately before that change. Bump (or
# remove the --revision flag) once upstream fixes the alias collision.
tei_model_revision: e5cf08aadaa33385f5990def41f7a23405aec398
# Inference batch sizing. Defaults are conservative; bump if you serve
# heavy ingestion workloads (e.g. Karakeep bulk re-embed).
tei_max_concurrent_requests: 512
tei_max_batch_tokens: 16384
