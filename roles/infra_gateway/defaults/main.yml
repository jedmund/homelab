---
# Stack identity
stack_name: infra-gateway
config_base: "{{ docker_base_path }}/{{ stack_name }}"

# DDClient settings
ddclient_daemon_interval: "300"
ddclient_ssl: "yes"
ddclient_use: "web"
ddclient_protocol: "cloudflare"
ddclient_atelier_zone: "atelier.house"
ddclient_atelier_subdomains:
  - atelier.house
  - ai.atelier.house
  - auth.atelier.house
  - beszel.atelier.house
  - bl.atelier.house
  - box.atelier.house
  - cat.atelier.house
  - chat.atelier.house
  - claw.atelier.house
  - dl.atelier.house
  - docs.atelier.house
  - files.atelier.house
  - flood.atelier.house
  - git.atelier.house
  - hu.atelier.house
  - id.atelier.house
  - idea.atelier.house
  - kb.atelier.house
  - keep.atelier.house
  - ko.atelier.house
  - kv.atelier.house
  - li.atelier.house
  - matrix.atelier.house
  - matrix-admin.atelier.house
  - matrix-auth.atelier.house
  - matrix-rtc.atelier.house
  - mc.atelier.house
  - models.atelier.house
  - n8n.atelier.house
  - netdata.atelier.house
  - obsidian-sync.atelier.house
  - ov.atelier.house
  - paseo.relay.atelier.house
  - photos.atelier.house
  - pi.atelier.house
  - ra.atelier.house
  - read.atelier.house
  - rom.atelier.house
  - rss.atelier.house
  - scrobble.atelier.house
  - search.atelier.house
  - sl.atelier.house
  - so.atelier.house
  - music.sort.atelier.house
  - speed.atelier.house
  - strudel.atelier.house
  - track.atelier.house
  - tr.atelier.house
  - tun.atelier.house
  - "*.tun.atelier.house"
  - frp.tun.atelier.house
  - tv.atelier.house
  - ups.atelier.house
  - watch.atelier.house
  - www.atelier.house
  - z.atelier.house
ddclient_fireplace_zone: "fireplace.cafe"
ddclient_fireplace_subdomains:
  - fireplace.cafe

# Traefik settings
traefik_enabled: true  # Set to false for local/IP-based testing without reverse proxy
traefik_image: traefik:v3.6
traefik_dashboard_enabled: "true"
traefik_log_level: INFO
traefik_domain: atelier.house
traefik_letsencrypt_ca_server: "https://acme-v02.api.letsencrypt.org/directory"
# Use staging for testing: "https://acme-staging-v02.api.letsencrypt.org/directory"
#
# Bind traefik to a specific host IP rather than 0.0.0.0 so other
# host services (e.g. feederhub's per-feeder ONVIF VIPs at .184/.185)
# can bind their own :80 listeners on alias IPs without colliding
# with the docker-proxy wildcard bind that 0.0.0.0:80 would create.
# Override per host in inventory or host_vars when needed; default
# preserves the legacy any-iface behaviour.
traefik_bind_ip: "0.0.0.0"

# PocketID settings
pocketid_port: 1411
pocketid_app_url: "https://id.{{ traefik_domain }}"
pocketid_trust_proxy: "true"
pocketid_email_login_notification_enabled: "true"

# TinyAuth settings
tinyauth_port: 3000
tinyauth_app_url: "https://auth.{{ traefik_domain }}"
tinyauth_log_level: debug
tinyauth_cookie_secure: "true"
tinyauth_cookie_domain: ".{{ traefik_domain }}"
tinyauth_session_duration: 168h
tinyauth_oauth_auto_redirect: pocketid
tinyauth_pocketid_name: "Pocket ID"
tinyauth_pocketid_auth_url: "{{ pocketid_app_url }}/authorize"
tinyauth_pocketid_token_url: "{{ pocketid_app_url }}/api/oidc/token"
tinyauth_pocketid_user_info_url: "{{ pocketid_app_url }}/api/oidc/userinfo"
tinyauth_pocketid_redirect_url: "{{ tinyauth_app_url }}/api/oauth/callback/pocketid"
tinyauth_pocketid_scopes: "openid email profile groups"
# TinyAuth access control
# tinyauth_allowed_user (single primary admin email) - defined in vault
tinyauth_allowed_user: "{{ vault_tinyauth_allowed_user }}"
# Shared atelier allowlist (comma-separated for tinyauth.apps.*.users.allow
# labels). Only referenced by apps that explicitly opt in, e.g. the
# llama-swap web UI for a partner/collaborator. All other apps continue to
# reference tinyauth_allowed_user directly and remain single-user.
# tinyauth_atelier_users (comma-separated email list) - defined in vault
tinyauth_atelier_users: "{{ vault_tinyauth_atelier_users }}"

# OpenSpeedTest settings
openspeedtest_port: 3000

# Line settings
line_port: 5180
line_repo: "git@github.com:jedmund/line.git"
line_version: "main"
line_source_path: "{{ docker_base_path }}/{{ stack_name }}/source/line"
line_backup_dir: /data/backups
line_app_url: "https://{{ traefik_domain }}"
line_oidc_issuer: "{{ pocketid_app_url }}"
line_oidc_redirect_uri: "{{ line_app_url }}/auth/callback"
# line_admin_emails (comma-separated admin email list) - defined in vault
line_admin_emails: "{{ vault_line_admin_emails }}"

# AdGuard settings
adguard_port_http: 80
adguard_port_setup: 3000
adguard_port_dns_tcp: 53
adguard_port_dns_udp: 53
# Bind DNS to the host LAN IP so it coexists with libvirt's dnsmasq on 192.168.122.1
adguard_dns_bind_ip: "{{ ansible_host }}"

# Server IPs for Traefik dynamic configs.
# Sourced from inventory so the IPs are only ever defined in one place.
mini_server_ip: "{{ hostvars['nuc-mini'].ansible_host }}"
max_server_ip: "{{ hostvars['max'].ansible_host }}"
mac_mini_ip: "{{ hostvars['mac-mini'].ansible_host }}"
dokploy_vm_ip: "{{ hostvars['dokploy-vm'].ansible_host }}"
