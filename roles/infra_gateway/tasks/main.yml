---
# Infra Gateway Stack - Traefik, PocketID, TinyAuth, DDClient, AdGuard
# Uses docker_compose_v2 for container orchestration

- name: Create {{ stack_name }} directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: '0755'
  loop:
    - "{{ docker_base_path }}/{{ stack_name }}"
    - "{{ docker_base_path }}/{{ stack_name }}/env"
    - "{{ docker_base_path }}/{{ stack_name }}/assets"
    - "{{ docker_base_path }}/{{ stack_name }}/config/pocketid/data"
    - "{{ docker_base_path }}/{{ stack_name }}/config/ddclient"
    - "{{ docker_base_path }}/{{ stack_name }}/config/line/data"
    - "{{ docker_base_path }}/{{ stack_name }}/config/adguard/work"
    - "{{ docker_base_path }}/{{ stack_name }}/config/adguard/conf"
    - "{{ docker_base_path }}/{{ stack_name }}/source"

- name: Create Traefik config directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: '0755'
  loop:
    - "{{ docker_base_path }}/{{ stack_name }}/config/traefik"
    - "{{ docker_base_path }}/{{ stack_name }}/config/traefik/dynamic"
    - "{{ docker_base_path }}/{{ stack_name }}/config/traefik/acme"
  when: traefik_enabled | bool

- name: Set permissions on Traefik ACME directory
  file:
    path: "{{ docker_base_path }}/{{ stack_name }}/config/traefik/acme"
    mode: '0600'
  when: traefik_enabled | bool

- name: Create Traefik acme.json file
  file:
    path: "{{ docker_base_path }}/{{ stack_name }}/config/traefik/acme/acme.json"
    state: touch
    mode: '0600'
    owner: "{{ ansible_user }}"
    modification_time: preserve
    access_time: preserve
  when: traefik_enabled | bool

- name: Deploy compose file
  template:
    src: compose.yaml.j2
    dest: "{{ docker_base_path }}/{{ stack_name }}/compose.yaml"
    owner: "{{ ansible_user }}"
    mode: '0644'
  notify: Restart {{ stack_name }} stack

- name: Deploy environment files
  template:
    src: "env/{{ item }}.env.j2"
    dest: "{{ docker_base_path }}/{{ stack_name }}/env/{{ item }}.env"
    owner: "{{ ansible_user }}"
    mode: '0600'
  loop:
    - traefik
    - pocketid
    - tinyauth
    - line
  no_log: true
  notify: Restart {{ stack_name }} stack

- name: Deploy Traefik static config
  template:
    src: traefik/traefik.yml.j2
    dest: "{{ docker_base_path }}/{{ stack_name }}/config/traefik/traefik.yml"
    owner: "{{ ansible_user }}"
    mode: '0644'
  when: traefik_enabled | bool
  notify: Restart {{ stack_name }} stack

- name: Deploy Traefik dynamic configs
  template:
    src: "traefik/dynamic/{{ item }}"
    dest: "{{ docker_base_path }}/{{ stack_name }}/config/traefik/dynamic/{{ item | regex_replace('.j2$', '') }}"
    owner: "{{ ansible_user }}"
    mode: '0644'
  loop:
    - services-mini.yml.j2
    - services-max.yml.j2
  when: traefik_enabled | bool
  notify: Restart {{ stack_name }} stack

- name: Deploy Traefik static files
  copy:
    src: "traefik/dynamic/{{ item }}"
    dest: "{{ docker_base_path }}/{{ stack_name }}/config/traefik/dynamic/{{ item }}"
    owner: "{{ ansible_user }}"
    mode: '0644'
  loop:
    - middlewares.yml
    - tls.yml
  when: traefik_enabled | bool
  notify: Restart {{ stack_name }} stack

- name: Deploy DDClient config
  template:
    src: ddclient/ddclient.conf.j2
    dest: "{{ docker_base_path }}/{{ stack_name }}/config/ddclient/ddclient.conf"
    owner: "{{ puid }}"
    group: "{{ pgid }}"
    mode: '0600'
  notify: Restart {{ stack_name }} stack

# ddclient with protocol=cloudflare can update existing A records but
# cannot create them. Adding a new entry to ddclient_atelier_subdomains
# is silently ignored on Cloudflare until somebody clicks through the
# dashboard to stub the record. This task bootstraps any missing record
# with the current WAN IP so ddclient can take over maintenance on the
# next tick. solo: true keeps it idempotent; ddclient will overwrite
# the value on its own schedule if the IP changes.
- name: Detect current WAN IP for Cloudflare bootstrap
  ansible.builtin.uri:
    url: https://api.ipify.org?format=json
    return_content: true
  register: _wan_ip_lookup
  delegate_to: localhost
  become: false
  run_once: true
  changed_when: false

- name: Bootstrap missing Cloudflare A records for atelier subdomains
  # ddclient's vault holds the Global API Key + email pair (the cloudflare
  # protocol's legacy auth), so we use the same here. api_token (Bearer)
  # would be cleaner but would require provisioning a new credential.
  community.general.cloudflare_dns:
    account_api_key: "{{ ddclient_cloudflare_api_token }}"
    account_email: "{{ ddclient_cloudflare_email }}"
    zone: "{{ ddclient_atelier_zone }}"
    record: "{{ item if item == ddclient_atelier_zone else item | regex_replace('\\.' ~ ddclient_atelier_zone ~ '$', '') }}"
    type: A
    value: "{{ _wan_ip_lookup.json.ip }}"
    proxied: false
    solo: true
    state: present
  loop: "{{ ddclient_atelier_subdomains }}"
  delegate_to: localhost
  become: false
  run_once: true

- name: Pull latest line source
  ansible.builtin.git:
    repo: "{{ line_repo }}"
    dest: "{{ line_source_path }}"
    version: "{{ line_version }}"
    force: yes
    accept_hostkey: true
  become: false
  notify: Restart {{ stack_name }} stack

- name: Deploy {{ stack_name }} stack
  community.docker.docker_compose_v2:
    project_src: "{{ docker_base_path }}/{{ stack_name }}"
    state: present
    remove_orphans: true
    build: always
    pull: "{{ docker_pull_policy | default('missing') }}"
  register: compose_result
